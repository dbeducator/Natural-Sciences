<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maxi Pie - Grade 5 Science Assistant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI'; background:#0a1a33; height:100vh; }

#maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:4px solid #fff; }
#maxi-fab img { width:85%; height:85%; border-radius:50%; }

#chat-modal { display:none; position:fixed; inset:0; background:rgba(7,7,12,0.95); }

.chat-container { display:flex; flex-direction:column; height:100%; max-width:500px; margin:auto; background:#f0f4f8; }

.chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:10px; color:white; border-bottom:3px solid #10b981; }
.chat-header img { width:45px; border-radius:50%; }

.close-btn { margin-left:auto; background:red; color:white; border:none; border-radius:50%; width:35px; height:35px; }

.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }

.msg { max-width:85%; padding:12px; border-radius:15px; }
.bot { background:white; }
.user { background:#10b981; color:white; align-self:flex-end; }

.chat-input-area { display:flex; padding:10px; background:white; }
.chat-input-area input { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
.send-btn { background:#10b981; color:white; border:none; padding:10px; border-radius:20px; }
</style>
</head>

<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
<div class="chat-container">

<div class="chat-header">
<img src="cat_full.png">
<div><b>Maxi Pie</b><br><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
<button class="close-btn" onclick="closeChat()">×</button>
</div>

<div id="messages" class="chat-messages">
<div class="msg bot">Sho! I'm Maxi Pie 🐾 your science chommie 🇿🇦 Ask me anything!</div>
</div>

<div class="chat-input-area">
<input id="userInput" placeholder="Ask me something, chommie..." onkeypress="if(event.key==='Enter') handleSend()">
<button class="send-btn" onclick="handleSend()">Send</button>
</div>

</div>
</div>

<script>

// ===== GLOBALS =====
let knowledgeBase = [];
let fuse = null;
let lastQuestion = '';
let quizMode = false;
let quizAnswer = '';
let score = 0;

// ===== CAPS TOPICS =====
const topicMap = [
 {name:"plants and animals", keys:["plants","animals","living"]},
 {name:"animal skeletons", keys:["skeleton","bones"]},
 {name:"structures", keys:["structure"]},
 {name:"food chains", keys:["food chain"]},
 {name:"life cycles", keys:["life cycle"]},
 {name:"metals and non-metals", keys:["metal"]},
 {name:"uses of metals", keys:["uses of metals"]},
 {name:"processing materials", keys:["processing"]},
 {name:"properties of processed materials", keys:["properties"]},
 {name:"cells and batteries", keys:["battery","cell"]},
 {name:"electric circuits", keys:["circuit"]},
 {name:"energy and movement", keys:["energy","movement"]},
 {name:"systems for moving things", keys:["pulley","lever","machine"]},
 {name:"safety with electricity", keys:["safety"]},
 {name:"sources of energy", keys:["sources","renewable"]},
 {name:"earth moves", keys:["earth","rotation","orbit"]},
 {name:"surface of the earth", keys:["surface","land","water"]},
 {name:"sedimentary rocks", keys:["sedimentary","rocks"]},
 {name:"fossils", keys:["fossil"]}
];

// ===== LOAD PDF =====
async function initResources(){
 const pdf = await pdfjsLib.getDocument('resources/logic.pdf').promise;

 for(let i=1;i<=pdf.numPages;i++){
  const page = await pdf.getPage(i);
  const text = (await page.getTextContent()).items.map(s=>s.str).join(' ');
  knowledgeBase.push({text});
 }

 fuse = new Fuse(knowledgeBase,{keys:['text'],threshold:0.3});
}

// ===== SEARCH =====
function searchPDF(q){
 if(!fuse) return null;
 const r = fuse.search(q);
 return r.length ? r[0].item.text : null;
}

// ===== TOPIC DETECT =====
function detectTopic(q){
 for(let t of topicMap){
  if(t.keys.some(k=>q.includes(k))){
   return t.name;
  }
 }
 return null;
}

// ===== MAIN SEND =====
function handleSend(){
 const input = document.getElementById('userInput');
 const text = input.value.trim();
 if(!text) return;

 addMessage('user',text);
 input.value='';

 setTimeout(()=> reply(text.toLowerCase()),300);
}

// ===== MAIN BRAIN =====
function reply(q){

// QUIZ
if(quizMode){
 if(q.includes(quizAnswer.toLowerCase())){
  score++;
  addMessage('bot',`Correct 😎🔥 Score: ${score}`);
 } else {
  addMessage('bot',`Eish 😅 correct answer was: ${quizAnswer}`);
 }
 quizMode=false;
 return;
}

if(q.includes("quiz")){
 startQuiz();
 return;
}

// GREET
if(/^(hi|hello|hey|aweh)/.test(q)){
 addMessage('bot',"Aweh chommie 👋 Ready to smash science? ⚡");
 return;
}

if(q.includes("how are you")){
 addMessage('bot',"Sharp sharp 😎 smoother than a taxi on payday!");
 return;
}

// TOPIC
const topic = detectTopic(q);

if(topic){
 const pdf = searchPDF(topic+" "+q);

 addMessage('bot',`😎 ${topic.toUpperCase()} mode activated!`);

 if(pdf){
  addMessage('bot',"📚 From your textbook:<br><br>"+pdf);
 }

 addMessage('bot',getJoke());

 lastQuestion="Explain that back to me 👀";
 addMessage('bot',lastQuestion);
 return;
}

// FOLLOW UP
if(lastQuestion){
 const pdf = searchPDF(q);

 addMessage('bot',"Nice thinking 👀 you're getting sharp!");

 if(pdf){
  addMessage('bot',"📚 Let me sharpen that:<br><br>"+pdf);
 }

 lastQuestion='';
 return;
}

// PURE PDF
const pdf = searchPDF(q);
if(pdf){
 addMessage('bot',"Yoh 😄 found something lekker:<br><br>"+pdf);
 return;
}

// FALLBACK
addMessage('bot',getFallback());

}

// ===== QUIZ =====
function startQuiz(){
 const r = knowledgeBase[Math.floor(Math.random()*knowledgeBase.length)].text;
 const snippet = r.split(" ").slice(0,10).join(" ");
 quizAnswer = snippet;
 quizMode=true;

 addMessage('bot',"🎓 QUIZ TIME!");
 addMessage('bot',snippet+" ... ?");
}

// ===== HUMOUR =====
function getJoke(){
 const jokes=[
  "You're learning faster than uncapped fibre 😎",
  "Even Eskom can't switch this off ⚡",
  "Science smoother than a Sunday braai 🔥",
  "You're becoming a whole scientist now 👀"
 ];
 return jokes[Math.floor(Math.random()*jokes.length)];
}

// ===== FALLBACK =====
function getFallback(){
 const f=[
  "Eish 😅 that one dodged me like a taxi!",
  "Hau 🤣 even Einstein paused there!",
  "Yoh 😭 brain buffering!"
 ];
 return f[Math.floor(Math.random()*f.length)];
}

// ===== UI =====
function addMessage(role,text){
 const div=document.createElement('div');
 div.className=`msg ${role}`;
 div.innerHTML=text;
 const box=document.getElementById('messages');
 box.appendChild(div);
 box.scrollTop=box.scrollHeight;
}

function openChat(){ document.getElementById('chat-modal').style.display='block'; }
function closeChat(){ document.getElementById('chat-modal').style.display='none'; }

window.onload=initResources;

</script>

</body>
</html>
