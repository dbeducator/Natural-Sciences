<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.basic.min.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #ffa000; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        #header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--secondary); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #e8f5e9; color: #333; border-bottom-left-radius: 2px; border: 1px solid #c8e6c9; }
        #input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .loading { font-style: italic; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Maxi Pie 🐾 Science Chommie 🇿🇦</div>
    <div id="messages">
        <div class="msg bot">Aweh! I'm Maxi Pie. Ready to crush Grade 5 Science with the Neshehe family? Ask me anything about Skeletons, Earth, or Food Chains! 🔥</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button onclick="handleSend()">Send</button>
    </div>
</div>

<script>
    let fuse;
    let knowledgeBase = [];
    let activeFollowUp = null;

    // 1. DATA: All the textbook topics we built
    const topics = [
        // TERM 4: PLANET EARTH
        { keys: ['layer', 'inner core', 'mantle', 'crust'], answer: "The Earth has 4 layers: the solid <strong>Inner Core</strong>, liquid <strong>Outer Core</strong>, semi-solid <strong>Mantle</strong>, and the thin <strong>Crust</strong>! 🌍", followUp: "Which layer moves the tectonic plates?", explanation: "The <strong>Mantle</strong>! 🔥 Convection currents in the hot rock move the plates above." },
        { keys: ['tectonic', 'plates move', 'drift'], answer: "The Earth's crust is broken into <strong>Tectonic Plates</strong> that float and move 2–10cm per year! 🗺️", followUp: "Name one piece of evidence that the continents were joined?", explanation: "The <strong>Jigsaw fit</strong> of Africa and SA, and identical fossils found on both sides! 🧩" },
        { keys: ['gondwana', 'supercontinent'], answer: "<strong>Gondwana</strong> was a massive supercontinent including SA, South America, and Antarctica that broke apart 180 million years ago! 🌍", followUp: "What mountains in SA formed when plates collided?", explanation: "The <strong>Cape Fold Mountains</strong>! ⛰️ They match mountains in Argentina." },
        { keys: ['weathering', 'physical', 'chemical', 'biological'], answer: "Weathering is breaking rock <strong>in place</strong>! It can be Physical (temp), Chemical (rust), or Biological (roots). 🧪🌱", followUp: "What is the difference between weathering and erosion?", explanation: "Weathering breaks it <strong>in place</strong>; <strong>Erosion</strong> moves it away! 💨" },
        { keys: ['rotation', 'day and night', 'axis'], answer: "The Earth <strong>rotates</strong> on its axis once every 24 hours. This gives us day and night! 🌍🌗", followUp: "Which way does the Earth rotate?", explanation: "From <strong>West to East</strong>! That's why the sun rises in the East. 🌅" },
        { keys: ['summer', 'winter', 'december', 'seasons'], answer: "In December, SA is tilted <strong>toward</strong> the sun, giving us hot days and Summer! ☀️🇿🇦", followUp: "Why is it winter in London when it's summer here?", explanation: "Because the Northern Hemisphere is tilted <strong>away</strong> from the sun at the same time! ❄️" },
        { keys: ['leap year', 'february 29'], answer: "Earth takes 365.25 days to orbit. We add a <strong>Leap Day</strong> every 4 years to fix the calendar! 📅", followUp: "Was 1900 a leap year?", explanation: "No! ❌ Century years are only leap years if divisible by 400 (like 2000)." },

        // TERM 1: LIFE AND LIVING
        { keys: ['scientist', 'hypothesis', 'investigate'], answer: "Scientists follow a 7-step process: Observe, Question, Predict, Investigate, Record, Conclude, Communicate! 🔬", followUp: "What is an 'educated guess' called?", explanation: "A <strong>Hypothesis</strong>! 💡 You test it during your experiment." },
        { keys: ['cradle', 'fossils', 'human'], answer: "The <strong>Cradle of Humankind</strong> near Jozi has human fossils dating back 3.5 million years! 🦕🇿🇦", followUp: "Why is it a UNESCO site?", explanation: "Because it helps us understand the very beginning of human history! 🌍" },
        { keys: ['skeleton', 'bone', 'rib cage'], answer: "Skeletons provide <strong>Support, Protection, and Movement</strong>! 🦴", followUp: "Which part protects your heart and lungs?", explanation: "The <strong>Rib Cage</strong>! 🛡️ It's like armor for your organs." },
        { keys: ['mammal', 'reptile', 'warm-blooded'], answer: "There are 5 vertebrate classes: Fish, Amphibians, Reptiles, Birds, Mammals! 🦁🐦🐢", followUp: "Which classes are warm-blooded?", explanation: "Only <strong>Birds and Mammals</strong>! 🔥 They keep a constant temperature." },
        { keys: ['structure', 'frame', 'shell', 'triangle'], answer: "<strong>Frame</strong> structures are skeletons; <strong>Shell</strong> structures have a strong outer layer. 🏗️🐚", followUp: "What is the strongest shape for a frame?", explanation: "The <strong>Triangle</strong>! 🔺 It cannot be deformed easily." },
        { keys: ['food chain', 'producer', 'apex'], answer: "Energy flows from the <strong>Sun</strong> to plants (producers) to animals (consumers)! ☀️🌿🦁", followUp: "Why are there fewer lions than impalas?", explanation: "The <strong>Energy Pyramid</strong>! 🔺 90% of energy is lost at each step as heat." }
    ];

    // 2. LOGIC: Handle Messaging
    function addMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerHTML = text;
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const userQueryRaw = input.value.trim();
        if (!userQueryRaw) return;

        addMessage('user', userQueryRaw);
        input.value = '';

        setTimeout(() => {
            const q = userQueryRaw.toLowerCase();

            // Check Greetings
            if (q.includes("hi") || q.includes("hello") || q.includes("aweh") || q.includes("how are you")) {
                addMessage('bot', "Aweh chommie! 👋 I'm sharp sharp. What science topic are we smashing today?");
                activeFollowUp = null;
                return;
            }

            // Check Follow-up Answer
            if (activeFollowUp) {
                addMessage('bot', `<strong>Nice try chommie! 🌟 Here is the real deal:</strong><br>${activeFollowUp.explanation}`);
                activeFollowUp = null;
                return;
            }

            // Search predefined Topics
            let foundTopic = topics.find(t => t.keys.some(k => q.includes(k)));

            if (foundTopic) {
                addMessage('bot', foundTopic.answer);
                setTimeout(() => {
                    addMessage('bot', `<em>Thinking question: ${foundTopic.followUp}</em>`);
                    activeFollowUp = foundTopic; 
                }, 800);
            } else {
                // PDF Search Fallback
                const results = fuse ? fuse.search(userQueryRaw) : [];
                if (results.length > 0) {
                    const matchText = results[0].item.text.substring(0, 450);
                    addMessage('bot', `Sho chommie, I found this in the notes: <br><br> "<em>${matchText}...</em>"`);
                } else {
                    addMessage('bot', "Eish chommie! 🕯️ I couldn't find that exact topic. Try asking about <strong>skeletons, fossils, or circuits</strong>!");
                }
            }
        }, 500);
    }

    // 3. PDF ENGINE: Load logic.pdf into the knowledgeBase
    async function initLogicPDF() {
        const url = 'resources/logic.pdf'; 
        try {
            const pdf = await pdfjsLib.getDocument(url).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const strings = content.items.map(item => item.str);
                knowledgeBase.push({ page: i, text: strings.join(' ') });
            }
            fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.3 });
            console.log("Logic PDF loaded successfully!");
        } catch (e) {
            console.log("PDF not found, using topic list only.");
        }
    }

    initLogicPDF();
</script>

</body>
</html>
