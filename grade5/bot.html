<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }

        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }

        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }

        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; }

        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }

        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:10px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; }

        .image-zoom { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1001; } 
        .image-zoom img { max-width: 90%; max-height: 90%; } 
        .image-zoom:target { display: flex; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Sho! I'm <strong>Maxi Pie</strong> 🐾, your science sidekick! I’m here to help you conquer the world of science. Ask me anything!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="handleTyping(event)">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<div id="image-zoom" class="image-zoom" onclick="this.style.display='none'">
    <img id="zoomed-image" src="" alt="Zoomed Image" />
</div>

<script>
    let knowledgeBase = [];
    let imagesDB = [];
    let fuse = null;
    let lastQuestion = '';  // To track the last follow-up question asked
    let detailedResponse = ''; // To keep the last detailed response

    async function initResources() {
        await initLogicPDF(); // Load primary knowledge base from the first PDF
        await initLogic2PDF(); // Load additional resources from the second PDF
    }

    async function initLogicPDF() {
        const url = 'resources/logic.pdf';
        const pdf = await pdfjsLib.getDocument(url).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
        }
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4, ignoreLocation: true });
    }

    async function initLogic2PDF() {
        const url = 'resources/logic2.pdf';
        const pdf = await pdfjsLib.getDocument(url).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            const context = canvas.getContext('2d');
            await page.render({ canvasContext: context, viewport }).promise;

            const imgSrc = canvas.toDataURL(); // Get the image as data URL
            const title = await getPageTitle(pdf, i); // Extract title
            imagesDB.push({ src: imgSrc, title: title }); // Store image and title
        }
    }

    async function getPageTitle(pdf, pageNumber) {
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        const titles = content.items.map(s => s.str).filter(str => str.trim() !== '');
        return titles.join(" ") || `Image from Page ${pageNumber}`; // Fallback title
    }

    function handleTyping(event) {
        if (event.key === 'Enter') {
            handleSend(); // Call send function on Enter key press
        }
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const userQueryRaw = input.value.trim();
        if (!userQueryRaw) return;

        addMessage('user', userQueryRaw);
        input.value = '';

        setTimeout(() => {
            const q = userQueryRaw.toLowerCase();

            // Greeting handling: match any variation
            const greetingsPatterns = [/^hi\b/, /^hello\b/, /^hey chommie\b/, /^aweh\b/, /how are you(.*)/];
            if (greetingsPatterns.some(rx => rx.test(q))) {
                addMessage('bot', "Aweh chommie! 👋 Ready to smash some science? What's the topic today?");
                return;
            }

            // Define greeting responses for variations
            const howAreYouResponses = [/how are you(.*)/i];
            if (howAreYouResponses.some(rx => rx.test(q))) {
                addMessage('bot', "I'm buzzing with energy! 😎 How can I help you today?");
                return;
            }

            // Define concise responses for topics
            const topics = [
                { keys: ['skeleton'], answer: "The skeleton gives support and shape to their bodies and protects soft organs.", followUp: "Can you list some functions of the skeleton?" },
                { keys: ['sedimentary rocks', 'sedimentary rock', 'sediment'], answer: "Sedimentary rocks are formed from particles that have settled out of water or air. They are layered and often contain fossils.", followUp: "What do you think helped form these layers?" },
                { keys: ['electrical circuits', 'electric circuit', 'circuit'], answer: "An electrical circuit is a complete path through which electric current can flow. It includes components such as wires, batteries, and bulbs.", followUp: "What happens if the circuit is broken?" },
                { keys: ['battery', 'batteries'], answer: "Batteries are devices that store chemical energy to provide electrical energy to circuits.", followUp: "Can you name some devices that use batteries?" },
                { keys: ['surface of the earth', "the earth's surface", 'earth surface'], answer: "The surface of the Earth consists of the crust, which is the outer layer of the planet. It is about 70 km thick and includes mountains, valleys, and oceans.", followUp: "What materials make up Earth's crust?" },
                { keys: ['fossils'], answer: "Fossils are the preserved remains or traces of animals and plants from the past.", followUp: "How do you think fossils are formed?" },
                { keys: ['plants and animals'], answer: "Plants and animals are classified based on shared characteristics and their habitats.", followUp: "Can you name some examples of vertebrates and invertebrates?" },
                { keys: ['food chains'], answer: "Food chains describe how energy is transferred from one organism to another in an ecosystem.", followUp: "What are producers and consumers in a food chain?" },
                { keys: ['metals and non-metals'], answer: "Metals are solid materials that conduct heat and electricity well, while non-metals do not.", followUp: "Can you name some examples of metals and non-metals?" },
                { keys: ['properties of materials'], answer: "The properties of materials include characteristics like strength, flexibility, and conductivity.", followUp: "What are some common properties used to describe materials?" },
                { keys: ['energy movement'], answer: "Energy movement refers to the transfer of energy from one location to another.", followUp: "What are some forms of energy?" },
                { keys: ['systems for moving things'], answer: "Systems for moving things involve using simple machines like levers and pulleys.", followUp: "Can you name some examples of moving systems?" },
                { keys: ['safety with electricity'], answer: "Safety with electricity involves precautions to avoid accidents such as not using electrical devices with wet hands.", followUp: "What safety measures should be taken when using electrical devices?" },
                { keys: ['sources of energy'], answer: "Sources of energy can be renewable (like solar and wind) or non-renewable (like coal and oil).", followUp: "Can you list some renewable energy sources?" },
                { keys: ['the earth moves'], answer: "The earth moves through rotations and orbits, affecting day/night cycles and the seasons.", followUp: "What causes the different seasons on Earth?" }
            ];

            // Maintain unique response logic; prevent duplication
            let matched = false;
            for (const topic of topics) {
                if (topic.keys.some(key => q.includes(key))) {
                    addMessage('bot', topic.answer);
                    lastQuestion = topic.followUp;
                    detailedResponse = topic.answer; 
                    matched = true;
                    break;
                }
            }

            // Handle last question response 
            if (!matched && lastQuestion) {
                addMessage('bot', detailedResponse);
                lastQuestion = ''; 
                return;
            }

            // Fuzzy search for relevant topics
            const results = fuse ? fuse.search(userQueryRaw) : [];
            if (results.length > 0) {
                const matchText = results[0].item.text;
                addMessage('bot', `Sho chommie, check this out! 😎<br><br>${matchText}`);
            } else {
                // Generic fallback response
                addMessage('bot', "Eish, chommie! I couldn't find that in the notes. 😅 But hey, try asking about skeletons, sedimentary rocks, electrical circuits, or fossils!");
            }
        }, 300); // Delay for simulated response time
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight; // Scroll to the latest message
    }

    function zoomImage(src) {
        const zoomedImage = document.getElementById('zoomed-image');
        zoomedImage.src = src; 
        document.getElementById('image-zoom').style.display = 'flex'; // Show the zoomed image
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources; // Load resources when the window is ready
</script>

</body>
</html>
