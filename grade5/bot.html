    function normalizePDF(text) {
        return text.toLowerCase().replace(/[^\w\s]/g, "").trim();
    }

    function getKeywords(q) {
        const words = normalizePDF(q).split(" ").filter(w => w.length > 2);
        const expanded = [...words];
        words.forEach(w => {
            if (SYNONYMS[w]) expanded.push(...SYNONYMS[w]);
        });
        return [...new Set(expanded)];
    }

    function scoreChunk(chunk, keywords) {
        const text = normalizePDF(chunk);
        const raw = chunk.toLowerCase();

        // Penalise question chunks — they contain keywords but aren't answers
        const trimmed = chunk.trim();
        if (trimmed.endsWith('?')) return -5;
        if (/^(what |how |why |which |give |list |name |describe |explain |below is|now we are|show where|carefully study)/i.test(trimmed)) return -8;

        // Penalise activity/instruction chunks heavily
        const isJunk = /^(now give|do not tell|use the knife|tap gently|cut out|paste|tick|fill in|write the names|perhaps an adult|as such the|they are designed|enabling activities|learners will have|if possible combine|hint what other|indb 20)/i.test(trimmed);
        if (isJunk) return -10;

        let score = 0;
        keywords.forEach(k => { if (text.includes(k)) score += 2; });

        // Bonus: exact phrase
        const joined = keywords.slice(0, 3).join(" ");
        if (joined.length > 3 && text.includes(joined)) score += 5;

        // Bonus: definitive sentences (starts with topic word)
        if (keywords.some(k => raw.startsWith(k))) score += 3;

        // Bonus: contains a definition pattern ("X is..." or "X are...")
        if (/ is | are | means | refers to /i.test(chunk)) score += 2;

        // Bonus: shorter = more precise (but not too short)
        if (chunk.length > 60 && chunk.length < 300) score += 2;

        // Penalise list-like chunks (components, materials lists)
        if (/^[A-Z][a-z]+,\s|,\s[a-z]+ [a-z]+,/i.test(chunk)) score -= 3;

        // Penalise teacher/activity language
        if (/teacher|learner|activity|exercise book|instruction|materials:|question:/i.test(raw)) score -= 3;

        return score;
    }

    function searchPDFChunks(q) {
        if (PDF_CHUNKS.length === 0) return null;
        const keywords = getKeywords(q);
        let bestScore = 0;
        let bestIndex = 0;

        PDF_CHUNKS.forEach((chunk, i) => {
            const score = scoreChunk(chunk, keywords);
            if (score > bestScore) { bestScore = score; bestIndex = i; }
        });

        if (bestScore === 0) return null;

        // Return context window: best chunk + neighbours
        return [
            PDF_CHUNKS[bestIndex - 1] || "",
            PDF_CHUNKS[bestIndex],
            PDF_CHUNKS[bestIndex + 1] || ""
        ].join(" ").trim();
    }

    function preparePDFChunks(fullText) {
        PDF_CHUNKS = fullText
            .split(/(?<=[.!?])\s+/)   // split on sentence boundaries
            .map(t => t.replace(/\s+/g, ' ').trim())
            .filter(t => t.length > 40 && t.length < 600);
    }

    async function initFromLearnerPDF() {
        const url = 'resources/logic2.pdf';
        const pdf = await pdfjsLib.getDocument(url).promise;

        // Step 1: Extract all text (fast)
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const text = textContent.items.map(s => s.str).join(' ');
            knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
        }

        // Build search indexes
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4, ignoreLocation: true });
        const fullText = knowledgeBase.map(p => p.text).join(' ');

    // Merge SA_PERSONALITY arrays with SA_ULTRA_FLOW for maximum variety
    function mergedRand(key) {
        const base = SA_PERSONALITY[key] || [];
        const ultra = SA_ULTRA_FLOW[key] || [];
        const combined = [...base, ...ultra];
        return combined[Math.floor(Math.random() * combined.length)];
    }

    function rand(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function deliverAnswer(answerText) {
        addMessage('bot', answerText);
        if (Math.random() < 0.4) {
            setTimeout(() => addMessage('bot', rand(SA_ULTRA_FLOW.jokes)), 800);
        }
    }

    const SA_MEGA_FLOW = {
        positive: [
            { user:["yes","yep","sure","definitely","let's go","yebo"], bot:"Lekker! 💪 Do you want to start with <b>rocks</b>, <b>fossils</b> or <b>electricity</b> first?" },
            { user:["okay","ok","cool","alright"], bot:"Aweh 😄 nice one. Should we do a quick warm-up quiz or jump straight into content?" },
            { user:["ready","let's do it"], bot:"Sharp! 🔥 I see you're ready. Rocks, fossils, or electricity first?" },
            { user:["good","fine","lekker"], bot:"Yoh 😄 that's lekker! Shall we dive into some cool science topics or warm up first?" }
        ],
        negative: [
            { user:["not really","maybe later","not now","skip"], bot:"Yoh 😎 we can chill, but your brain might get bored 😏 How about a quick fun fact?" },
            { user:["not interested"], bot:"Yoh 😎 I feel you. But just one small fact could blow your mind 💥 Rocks, fossils, or electricity?" }
        ],

        ],
        funFacts: [
            { user:["fun fact","tell me something","something interesting"], bot:"Yoh 😄 did you know the oldest rock on Earth is over 4 billion years old? 🔥 Wanna know more cool science?" },

        ],
        praiseInsert: [
            { user:["got it","i understand","i see","makes sense"], bot:"Sharp! 🔥 You're getting this! Want to continue?" },
            { user:["thanks","thank you"], bot:"Aweh 😄 you're learning lekker! Next up — want <b>rocks</b>, <b>fossils</b> or <b>electricity</b>?" }
        ],
        dynamicInsert: [
            "Yoh 🔥 that's lekker thinking!",
            "Aweh 😄 keep it up chommie!",
            "Eish 😎 you're smashing this!",
            "Lekker hey! 💪 I see the brain working.",
            "Hayi 😅 you're getting there, keep pushing!",
            "Aweh 🔬 science vibes strong!",
            "Eish 😎 this one would impress even Leslee!"
        ]
    };

    // Only fires for short conversational replies — never intercepts science questions
    function handleMegaFlow(q) {
        const steps = [
            SA_MEGA_FLOW.positive, SA_MEGA_FLOW.negative, SA_MEGA_FLOW.unsure,
            SA_MEGA_FLOW.topicFollowUp, SA_MEGA_FLOW.funFacts, SA_MEGA_FLOW.praiseInsert
        ];
        for (let step of steps) {
            for (let obj of step) {
                if (obj.user.some(u => q === u || q === u + '!' || q === u + '.')) {
                    addMessage('bot', obj.bot);
                    if (Math.random() < 0.35) {
                        setTimeout(() => addMessage('bot', rand(SA_ULTRA_FLOW.encouragement)), 750);
                    }
                    return true;
                }
            }
        }
        return false;
    }

    // ── Conversation state ───────────────────────────────────────────────
    let userState = { inLearningMode: false };

    // ── Content detection ─────────────────────────────────────────────────
    function isContentQuery(q) {
        q = q.toLowerCase();
        const contentKeywords = [
            "what is","what are","define","explain","how does","how do","how is",
            "types of","examples of","tell me about","describe","name the",
            "rocks","fossils","electricity","igneous","sedimentary","metamorphic",
            "circuit","current","voltage","battery","skeleton","bone","metal",
            "food chain","producer","consumer","fuel","coal","energy","plant",
            "animal","life cycle","structure","material","fossil","surface","earth",
            "layer","weathering","erosion","habitat","ecosystem","amphibian",
            "vertebrate","invertebrate","ligament","tendon","joint","muscle",
            "photosynthesis","substation","pylon","conductor","insulator"
        ];
        return contentKeywords.some(k => q.includes(k));
    }

    function isLikelyLearningIntent(q) {
        q = q.toLowerCase();
        // Must start with a question word AND have a science-like noun
        const questionStarters = ["what","how","why","when","where","which","name","list","define","explain","describe"];
        const startsAsQuestion = questionStarters.some(s => q.startsWith(s));
        if (!startsAsQuestion) return false;
        // Must be more than 2 words to avoid "what?" or "how?"
        if (q.split(' ').length < 2) return false;
        return true;
    }

    // ── PDF query handler ─────────────────────────────────────────────────
    function handlePDFQuery(q) {
        userState.inLearningMode = true;

        if (!fuse) {
            addMessage('bot', "Eish chommie, I'm still loading the textbook 📚 Give me a moment and try again!");
            return;
        }

        // Track topic memory
        trackTopic(q);
        lastQuery = q;

        // Skip words guard
        const skipWords = new Set(['nice','good','ok','okay','cool','yes','no','wow','great','lol','haha','sure','thanks','fine','ready','go']);
        if (q.split(' ').length <= 2 && skipWords.has(q.replace(/[^a-z]/g,''))) {
            addMessage('bot', mergedRand('encouragement'));
            return;
        }

        let response;
        const results = fuse.search(q, { limit: 4 });
        if (results.length > 0) {
            const rawText = results.map(r => r.item.text).join(' ');
            lastRawAnswer = rawText;
            response = formatAnswer(q, rawText);
        } else {
            lastRawAnswer = '';
            response = mergedRand('confusion') + "<br><br>Try asking about <strong>rocks</strong>, <strong>fossils</strong>, <strong>electricity</strong>, <strong>metals</strong>, <strong>skeletons</strong> or <strong>food chains</strong> 🔬";
        }

        addMessage('bot', response);

        // Personality inserts AFTER answer
        if (Math.random() < 0.35) {
            setTimeout(() => addMessage('bot', rand(EXTRA_PERSONALITY.praise)), 600);
        }
        if (Math.random() < 0.25) {
            setTimeout(() => addMessage('bot', rand(SA_ULTRA_FLOW.encouragement)), 1000);
        }

        // Show clickable suggestion chips
        followUp(q);
    }

    // ── Main router ───────────────────────────────────────────────────────
    const CHAT_PHRASES = new Set([
        "i don't know","idk","i dont know","okay","ok","cool","nice","good","great",
        "wow","amazing","sure","yes","no","nah","maybe","thanks","thank you",
        "lol","haha","okay i will","call my mom","i will try","let's go","ready",
        "not sure","i see","got it","makes sense","interesting","really","seriously",
        "that was quick","that was fast","nice one","good one","sweet","lekker",
        "alright","yebo","sharp","heita","aweh","sho","eish","hayi","yoh"
    ]);

    function routeQuery(q) {
        // Block purely conversational phrases from hitting PDF
        const qClean = q.trim().toLowerCase();

        // Handle typed chip phrases
        if (qClean === 'explain it simply' || qClean === 'explain') { chipAction('explain', lastQuery); return; }
        if (qClean === 'give an example' || qClean === 'example') { chipAction('example', lastQuery); return; }
        if (qClean === 'go deeper' || qClean === 'deeper') { chipAction('deeper', lastQuery); return; }
        if (qClean === 'quiz me on this' || qClean === 'quiz me') { startQuiz(); return; }

        if (CHAT_PHRASES.has(qClean)) { ultraFlowResponse(q); return; }
        if (qClean.split(' ').length <= 3 && !isContentQuery(qClean) && !isLikelyLearningIntent(qClean)) {
            ultraFlowResponse(q); return;
        }
        if (isContentQuery(q) || isLikelyLearningIntent(q)) {
            handlePDFQuery(q);
        } else {
            ultraFlowResponse(q);
        }
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query) return; // Exit if input is empty

        addMessage('user', query); // Display the user's message
        input.value = ''; // Clear the input box
        
        setTimeout(() => {
            const q = query.toLowerCase();

            // Greetings
            const greetings = ["hi", "hello", "hey chommie", "aweh", "heita", "howzit"];
            if (greetings.some(g => q === g || q.startsWith(g + ' ') || q.startsWith(g + '!'))) {
                addMessage('bot', mergedRand('greetings'));
                return;
            }

            // How are you
            if (q.includes("how are you") || q.includes("how's it going") || q.includes("howzit")) {
                addMessage('bot', mergedRand('mood') + " You chommie? Feeling ready?");
                return;
            }

            // Topics list
            if (q.includes('what topics') || q.includes('what can i learn') || q.includes('what chapters') || q === 'topics') {
                if (tocChapters.length > 0) {
                    addMessage('bot', "Sho chommie! 📚 Here are the topics in your Grade 5 textbook:<br><br>" + tocChapters.map(t => "• " + t).join('<br>'));
                } else {
                    addMessage('bot', "Sho chommie! 📚 Your textbook covers: <b>Life & Living</b> (plants, animals, skeletons, food chains, life cycles), <b>Matter & Materials</b> (metals, processing), <b>Energy & Change</b> (electricity, circuits, fuels), and <b>Planet Earth</b> (Earth's surface, rocks, fossils). Ask me about any of these!");
                }
                return;
            }

            // Personality: named people
            if (q.includes("leslee") || q.includes("who is leslee")) {
                addMessage('bot',
                    `Yoh 😄 Leslee is not just anyone — she's the <b>visionary behind everything</b> here.<br><br>` +
                    `She's someone who genuinely wants people to grow, learn and do better 💡<br><br>` +
                    `Tune in here 🎧:<br><br>` +
                    `🔴 <b>Live Radio:</b><br>https://coach-l-radio.duckdns.org/public/coach-l-radio<br><br>` +
                    `🎙️ <b>Podcasts:</b><br>https://coach-l-radio.duckdns.org/public/coach-l-radio/podcasts<br><br>` +
                    `Yoh chommie… you'll understand the vibe once you listen 😌`
                );
                return;
            }
            if (q.includes("who is linda") || q === "linda") {
                addMessage('bot', "Yoh Linda 😄 He's that one who will remind you to stay focused! If you slack, he'll definitely call you out hey 😂");
                return;
            }
            if (q.includes("lexi") || q.includes("alexis")) {
                addMessage('bot', "Lexi 😆 She's smart but also quick to search things up! But here we actually learn it properly chommie 💪");
                return;
            }
            if (q.includes("sadee")) {
                addMessage('bot', "Sadee 😂 That one will take chances and hope it works! But we're doing it the right way here 😎");
                return;
            }

            // Quiz
            if (q.includes('quiz') || q.includes('test me') || q.includes('ask me a question') || q.includes('assessment')) {
                startQuiz();
                return;
            }

            // Quiz answer
            if (quizMode && currentQuiz) {
                const qText = currentQuiz.question;
                const aText = currentQuiz.answer;
                quizMode = false;
                currentQuiz = null;
                addMessage('bot', `${rand(SA_ULTRA_FLOW.praise)} Here's what the textbook says:<br><br><strong>Q: ${qText}</strong><br><br>${aText}<br><br>Say <strong>quiz me</strong> for another one!`);
                return;
            }

            // Route everything else through the smart router
            routeQuery(q);

        }, 400); // Delay for simulated processing time
    }

    // Quiz state
    let quizMode = false;
    let currentQuiz = null;

    function startQuiz() {
        if (!knowledgeBase.length) {
            addMessage('bot', "Eish, still loading the textbook! 😅 Try again in a sec.");
            return;
        }

        const qaPairs = [];
        knowledgeBase.forEach(chunk => {
            const text = chunk.text;
            // Match a question followed by answer content
            const matches = text.match(/([A-Z][^?]{15,}[?])\s*([^?]{30,}[.!])/g);
            if (matches) {
                matches.forEach(m => {
                    const parts = m.match(/^([^?]+[?])\s*(.+)$/s);
                    if (parts && parts[1] && parts[2]) {
                        const q = parts[1].trim();
                        const a = parts[2].trim().substring(0, 400);
                        // Skip activity/navigation/diagram instructions
                        const skip = /^(Do you|Can you|Look at|Think about|Draw|After you|Consider|Which cheek|Which direction|Stand facing|Turn to your|ACTIVITY|NatSci)/i.test(q);
                        // Must be a proper science question with substance
                        const hasContent = q.length > 20 && a.length > 30;
                        if (!skip && hasContent) {
                            qaPairs.push({ question: q, answer: a });
                        }
                    }
                });
            }
        });

        if (qaPairs.length === 0) {
            addMessage('bot', "Eish, I couldn't pull a question right now. 😅 Try asking me a topic!");
            return;
        }

        const pick = qaPairs[Math.floor(Math.random() * qaPairs.length)];
        quizMode = true;
        currentQuiz = pick;
        addMessage('bot', `🧠 Quiz time chommie!<br><br><strong>${pick.question}</strong><br><br>Type your answer — then I'll show you what the textbook says!`);
    }
    function formatAnswer(query, rawText, deepMode = false) {
        const q = query.toLowerCase();

        // Remove page artifacts, file stamps, chapter headers, page numbers
        const cleaned = rawText
            .replace(/NatSci&Tech_Gr5_Book\.indb[^\n]*/g, '')
            .replace(/NatSci&Tech_Gr5_TG_Book\.indb[^\n]*/g, '')
            .replace(/(Life and living|Matter and materials|Energy and change|Planet Earth and beyond|Systems and control)[^\d]*\d+/g, '')
            .replace(/Chapter \d+:[^.!?\d]{3,60}/g, '')
            .replace(/KEY (CONCEPTS|QUESTIONS|WORDS?)[^.!?]*/g, '')
            .replace(/ACTIVITY \d+\.\d+[^.!?]*/g, '')
            .replace(/QUESTIONS?[^.!?]{0,10}(?=\s)/g, '')
            .replace(/REVISION[^.!?]*/g, '')
            .replace(/INSTRUCTIONS?:[^.!?]*/g, '')
            .replace(/New words[^.!?]*/g, '')
            .replace(/indb \d{4}[^.!?]*/g, '')
            .replace(/\b\d{2,3}\b/g, '')
            .replace(/\s{2,}/g, ' ')
            .trim();

        // Split into sentences
        const sentences = (cleaned.match(/[^.!?]{15,}[.!?]+/g) || []).map(s => s.trim());

        // Keywords from query (all words 2+ chars)
        const keywords = q.replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 2);

        // Score: +3 per keyword match, -10 if question or instruction
        const scored = sentences.map(s => {
            const sl = s.toLowerCase();
            const isJunk = /^(do you|can you|list|find|identify|explain|describe|complete|use the|look at|write|draw|think about|remember|give two|give an|now we|show where|carefully|below is|label|what do)/i.test(s.trim());
            const isQuestion = s.trim().endsWith('?');
            const kwScore = keywords.reduce((n, kw) => n + (sl.includes(kw) ? 3 : 0), 0);
            const lengthBonus = (s.length > 40 && s.length < 350) ? 1 : 0;
            const score = (isJunk || isQuestion) ? -10 : kwScore + lengthBonus;
            return { s, score };
        });

        const top = scored
            .filter(x => x.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, deepMode ? 10 : 6)
            .map(x => x.s);

        if (top.length === 0) {
            const topicExists = keywords.some(kw => cleaned.toLowerCase().includes(kw));
            if (!topicExists) {
                return "Eish chommie! 😅 I don't think that topic is in our Grade 5 textbook. Try asking about <strong>rocks</strong>, <strong>fossils</strong>, <strong>electricity</strong>, <strong>metals</strong>, <strong>skeletons</strong>, or <strong>food chains</strong>!";
            }
            const fallback = sentences.filter(s => s.length > 40 && !/^(do you|can you|list|find|identify|explain|describe|complete|give two|below is)/i.test(s)).slice(0, 3);
            if (fallback.length === 0) return "Eish chommie, I found something but it's a bit messy. 😅 Try asking differently!";
            top.push(...fallback);
        }

        const emoji = q.includes('rock') || q.includes('sediment') ? '🪨'
                    : q.includes('fossil') ? '🦕'
                    : q.includes('electr') || q.includes('circuit') || q.includes('batter') ? '⚡'
                    : q.includes('metal') ? '🔩'
                    : q.includes('plant') || q.includes('food chain') || q.includes('photosyn') ? '🌿'
                    : q.includes('animal') ? '🐾'
                    : q.includes('skeleton') || q.includes('bone') ? '🦴'
                    : q.includes('earth') || q.includes('season') || q.includes('planet') ? '🌍'
                    : q.includes('energy') || q.includes('fuel') || q.includes('coal') ? '🔥'
                    : q.includes('water') || q.includes('cloud') || q.includes('rain') ? '💧'
                    : q.includes('struct') ? '🏗️'
                    : q.includes('material') ? '🧱'
                    : q.includes('ligament') || q.includes('tendon') || q.includes('joint') ? '🦴'
                    : q.includes('amphibian') || q.includes('reptile') ? '🐸'
                    : q.includes('producer') || q.includes('consumer') ? '🌿'
                    : '🔬';

        return `Sho chommie! ${emoji} Here's what the textbook says:<br><br>` + top.join('<br><br>');
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight; // Scroll to the latest message
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources; // Load resources when the window is ready
</script>
