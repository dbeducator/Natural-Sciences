<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maxi Pie - Grade 5 Science Assistant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI';background:#0a1a33;height:100vh;overflow:hidden;}

#maxi-fab{position:fixed;bottom:25px;right:25px;width:75px;height:75px;background:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:999;border:4px solid #fff;}
#maxi-fab img{width:85%;height:85%;border-radius:50%;}

#chat-modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;}
.chat-container{display:flex;flex-direction:column;height:100%;max-width:500px;margin:auto;background:#f0f4f8;}

.chat-header{background:#0a1a33;padding:15px;display:flex;gap:10px;color:white;}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.msg{padding:10px;border-radius:15px;max-width:80%;}
.bot{background:white;}
.user{background:#10b981;color:white;align-self:flex-end;}

.chat-input-area{display:flex;padding:10px;background:white;}
.chat-input-area input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;}
.send-btn{background:#10b981;color:white;border:none;padding:10px;border-radius:20px;}

.image-zoom{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.image-zoom img{max-width:90%;max-height:90%;}
</style>
</head>

<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
<div class="chat-container">

<div class="chat-header">
<h3>Maxi Pie</h3>
<button onclick="closeChat()" style="margin-left:auto;">×</button>
</div>

<div id="messages" class="chat-messages">
<div class="msg bot">Sho! I'm <b>Maxi Pie</b> 🐾 Ask me anything about science!</div>
</div>

<div class="chat-input-area">
<input id="userInput" placeholder="Ask..." onkeypress="if(event.key==='Enter') handleSend()">
<button class="send-btn" onclick="handleSend()">Send</button>
</div>

</div>
</div>

<div id="image-zoom" class="image-zoom" onclick="this.style.display='none'">
<img id="zoomed-image">
</div>

<script>

let knowledgeBase=[];
let fuse=null;
let imageIndex=[];
let isReady=false;

/* ---------- INIT ---------- */

async function initResources(){
    try{
        await initLogicPDF();   // TEXT FIRST
        isReady=true;           // BOT READY

        initLogic2PDF();        // LOAD IMAGES IN BACKGROUND

        console.log("✅ Ready");
    }catch(e){
        console.error(e);
    }
}

/* ---------- TEXT ---------- */

async function initLogicPDF(){
    const pdf=await pdfjsLib.getDocument('resources/logic.pdf').promise;

    for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        const text=content.items.map(i=>i.str).join(" ");
        knowledgeBase.push({text});
    }

    fuse=new Fuse(knowledgeBase,{keys:['text'],threshold:0.4});
}

/* ---------- IMAGE INDEX ---------- */

async function initLogic2PDF(){
    try{
        const pdf=await pdfjsLib.getDocument('resources/logic2.pdf').promise;

        for(let i=1;i<=pdf.numPages;i++){
            const page=await pdf.getPage(i);
            const content=await page.getTextContent();
            const title=content.items.map(i=>i.str).join(" ").toLowerCase();

            imageIndex.push({
                page:i,
                title:title,
                keywords:title.split(" ")
            });
        }

        console.log("📸 Image index ready");

    }catch(e){
        console.error(e);
    }
}

/* ---------- IMAGE RENDER ---------- */

async function tryShowImage(query){
    if(!imageIndex.length) return false;

    const q=query.toLowerCase();
    const words=q.split(" ");

    const match=imageIndex.find(img =>
        words.some(w =>
            img.title.includes(w) ||
            img.keywords.includes(w)
        )
    );

    if(!match) return false;

    const pdf=await pdfjsLib.getDocument('resources/logic2.pdf').promise;
    const page=await pdf.getPage(match.page);

    const viewport=page.getViewport({scale:1.5});
    const canvas=document.createElement('canvas');

    canvas.width=viewport.width;
    canvas.height=viewport.height;

    await page.render({
        canvasContext:canvas.getContext('2d'),
        viewport
    }).promise;

    const img=canvas.toDataURL();

    addMessage('bot',
        `📸 Here’s what I found:<br>
        <img src="${img}" style="max-width:100%;border-radius:10px;"
        onclick="zoomImage('${img}')">
        <br><small>${match.title.substring(0,80)}</small>`
    );

    return true;
}

/* ---------- CHAT ---------- */

function handleSend(){
    const input=document.getElementById('userInput');
    const query=input.value.trim();
    if(!query) return;

    addMessage('user',query);
    input.value='';

    if(!isReady){
        addMessage('bot',"⏳ Loading science brain...");
        return;
    }

    processQuery(query);
}

function processQuery(query){
    const q=query.toLowerCase();

    /* BASIC */
    const basic={
        "fossils":"Fossils are preserved remains of ancient life.",
        "electricity":"Electricity is flow of electrons.",
        "metals":"Metals conduct heat and electricity."
    };

    let response=basic[q];
    if(!response){
        const key=Object.keys(basic).find(k=>q.includes(k));
        if(key) response=basic[key];
    }

    if(response){
        addMessage('bot',response);
        return;
    }

    /* IMAGE FIRST */
    tryShowImage(query).then(found=>{
        if(found) return;

        /* TEXT SEARCH */
        const results=fuse.search(query,{limit:3});

        if(results.length){
            const text=results.map(r=>r.item.text).join(" ").slice(0,400);
            addMessage('bot',text);
        }else{
            addMessage('bot',"Eish 😅 Try rocks, fossils, electricity...");
        }
    });
}

/* ---------- UI ---------- */

function addMessage(role,text){
    const div=document.createElement('div');
    div.className=`msg ${role}`;
    div.innerHTML=text;
    const box=document.getElementById('messages');
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}

function zoomImage(src){
    document.getElementById('zoomed-image').src=src;
    document.getElementById('image-zoom').style.display='flex';
}

function openChat(){document.getElementById('chat-modal').style.display='block';}
function closeChat(){document.getElementById('chat-modal').style.display='none';}

window.onload=initResources;

</script>

</body>
</html>
