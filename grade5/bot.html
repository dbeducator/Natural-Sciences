<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maxi Pie - Grade 5 Science Assistant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height:100vh; overflow:hidden; }

#maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
#maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit:cover; }

#chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7,7,12,0.95); z-index:1000; }
.chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }

.chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
.chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }

.close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; }

.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
.msg { max-width:85%; padding:12px 16px; border-radius:18px; font-size:16px; }
.bot { align-self:flex-start; background:white; color:#333; }
.user { align-self:flex-end; background:#10b981; color:white; }

.chat-input-area { padding:15px; background:white; display:flex; gap:10px; }
.chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; }
.send-btn { background:#10b981; color:white; border:none; padding:10px; border-radius:25px; }

.image-zoom { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1001; }
.image-zoom img { max-width:90%; max-height:90%; }
</style>
</head>

<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
<div class="chat-container">

<div class="chat-header">
<img src="cat_full.png">
<div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
<button class="close-btn" onclick="closeChat()">×</button>
</div>

<div id="messages" class="chat-messages">
<div class="msg bot">Sho! I'm <strong>Maxi Pie</strong> 🐾 Ask me anything about science!</div>
</div>

<div class="chat-input-area">
<input type="text" id="userInput" placeholder="Ask me something..." onkeypress="if(event.key==='Enter') handleSend()">
<button onclick="handleSend()" class="send-btn">Send</button>
</div>

</div>
</div>

<div id="image-zoom" class="image-zoom" onclick="this.style.display='none'">
<img id="zoomed-image">
</div>

<script>

let knowledgeBase = [];
let imagesDB = [];
let fuse = null;
let isReady = false;

const MAX_PAGES = 10;

/* ---------------- INIT ---------------- */

async function initResources() {
    try {
        await initLogicPDF();
        await initLogic2PDF();
        isReady = true;
        console.log("✅ Bot Ready");
    } catch (e) {
        console.error("Init error:", e);
    }
}

/* ---------------- TEXT PDF ---------------- */

async function initLogicPDF() {
    try {
        const pdf = await pdfjsLib.getDocument('resources/logic.pdf').promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            knowledgeBase.push({ text });
        }

        fuse = new Fuse(knowledgeBase, {
            keys: ['text'],
            threshold: 0.4,
            ignoreLocation: true
        });

    } catch (e) {
        console.error("Text PDF error:", e);
    }
}

/* ---------------- IMAGE PDF ---------------- */

async function initLogic2PDF() {
    try {
        const pdf = await pdfjsLib.getDocument('resources/logic2.pdf').promise;

        for (let i = 1; i <= Math.min(pdf.numPages, MAX_PAGES); i++) {
            const page = await pdf.getPage(i);

            const viewport = page.getViewport({ scale: 1 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: canvas.getContext('2d'),
                viewport
            }).promise;

            const img = canvas.toDataURL();

            const title = await extractTitle(page);

            imagesDB.push({
                src: img,
                title: title.toLowerCase(),
                keywords: title.toLowerCase().split(" ")
            });
        }

    } catch (e) {
        console.error("Image PDF error:", e);
    }
}

async function extractTitle(page) {
    const content = await page.getTextContent();
    return content.items.map(i => i.str).join(" ").substring(0, 80);
}

/* ---------------- CHAT ---------------- */

function handleSend() {
    const input = document.getElementById('userInput');
    const query = input.value.trim();
    if (!query) return;

    addMessage('user', query);
    input.value = '';

    if (!isReady) {
        addMessage('bot', "⏳ Loading science brain...");
        return;
    }

    setTimeout(() => processQuery(query), 400);
}

function processQuery(query) {
    const q = query.toLowerCase();

    /* -------- GREETINGS -------- */
    if (["hi","hello","hey","aweh"].some(g=>q.includes(g))) {
        addMessage('bot',"Aweh chommie! 👋 What topic?");
        return;
    }

    /* -------- BASIC RESPONSES -------- */
    const basic = {
        "fossils":"Fossils are preserved remains of ancient life.",
        "electricity":"Electricity is the flow of electrons.",
        "metals":"Metals conduct heat and electricity."
    };

    let response = basic[q];
    if (!response) {
        const key = Object.keys(basic).find(k => q.includes(k));
        if (key) response = basic[key];
    }

    if (response) {
        addMessage('bot', response);
        return;
    }

    /* -------- IMAGE MATCH (FIXED) -------- */
    const words = q.split(" ");

    const match = imagesDB.find(img =>
        words.some(w =>
            img.title.includes(w) ||
            img.keywords.includes(w)
        )
    );

    if (match) {
        addMessage('bot',
            `📸 Found this:<br>
            <img src="${match.src}" style="max-width:100%;border-radius:10px;margin-top:10px;"
            onclick="zoomImage('${match.src}')">
            <br><small>${match.title}</small>`
        );
        return;
    }

    /* -------- FUZZY SEARCH -------- */
    if (!fuse) {
        addMessage('bot',"Still loading...");
        return;
    }

    const results = fuse.search(query, { limit: 3 });

    if (results.length) {
        const text = results.map(r=>r.item.text).join(" ").slice(0,400);
        addMessage('bot', text);
    } else {
        addMessage('bot',"Eish 😅 Try asking about rocks, fossils, electricity...");
    }
}

/* ---------------- UI ---------------- */

function addMessage(role,text){
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = text;
    const box = document.getElementById('messages');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function zoomImage(src){
    document.getElementById('zoomed-image').src = src;
    document.getElementById('image-zoom').style.display = 'flex';
}

function openChat(){ document.getElementById('chat-modal').style.display='block'; }
function closeChat(){ document.getElementById('chat-modal').style.display='none'; }

window.onload = initResources;

</script>

</body>
</html>
