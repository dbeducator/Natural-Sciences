<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family:'Segoe UI', Roboto, sans-serif; background:#0a1a33; height:100vh; overflow:hidden; }
        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:999; border:4px solid #fff; box-shadow:0 6px 20px rgba(0,0,0,0.5); }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; }
        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7,7,12,0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }
        .chat-header { background:#0a1a33; color:white; padding:15px; display:flex; align-items:center; gap:12px; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; font-size:16px; line-height:1.4; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { background:white; color:#333; align-self:flex-start; border-bottom-left-radius:2px; }
        .user { background:#10b981; color:white; align-self:flex-end; border-bottom-right-radius:2px; }
        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:0 20px; border-radius:25px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button onclick="closeChat()" style="margin-left:auto;background:#ef4444;color:white;border:none;border-radius:50%;width:35px;height:35px;font-weight:bold;cursor:pointer;">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Sho! I'm <strong>Maxi Pie</strong> 🐾 Ask me anything about science!</div>
        </div>
        <div class="chat-input-area">
            <input id="userInput" placeholder="Ask a question, chommie..." onkeypress="if(event.key==='Enter') handleSend()">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
let knowledgeBase = [];
let fuse = null;

async function initResources() {
    const files = [
        { path: 'resources/logic.pdf', type: 'pdf' },
        { path: 'resources/logic2.html', type: 'html' }
    ];

    for (const file of files) {
        try {
            const res = await fetch(file.path);
            if (!res.ok) continue;
            if (file.type === 'pdf') {
                const buffer = await res.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');
                    knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
                }
            } else {
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                knowledgeBase.push({ text: doc.body.innerText.trim() });
            }
        } catch (e) { console.warn("Skip:", file.path); }
    }
    // STRICTOR THRESHOLD (0.3) avoids random guessing
    fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.3, ignoreLocation: true });
}

function handleSend() {
    const input = document.getElementById('userInput');
    const query = input.value.trim();
    if (!query) return;

    addMessage('user', query);
    input.value = '';

    setTimeout(() => {
        const q = query.toLowerCase();

        // 1. CHOMMIE GATEKEEPER (Hard stop for social chat)
        if (q === "hi" || q === "hello" || q === "sho" || q === "aweh") {
            addMessage('bot', "Aweh chommie! 👋 Ready to smash some science? Ask me a question!");
            return;
        }
        if (q.includes("who are you") || q.includes("your name")) {
            addMessage('bot', "I'm <strong>Maxi Pie</strong> 🐾, your Science chommie! I help you study your notes. 🔥");
            return;
        }

        // 2. GLOBAL SCIENCE FALLBACK (For words not in your specific PDFs)
        if (q.includes("tree")) {
            addMessage('bot', "A <strong>tree</strong> is a tall plant with a wooden trunk. It uses sunlight to grow! 🌳");
            return;
        }
        if (q.includes("planet")) {
            addMessage('bot', "A <strong>planet</strong> is a large round object that moves around a star (the Sun). Earth is our home! 🌍");
            return;
        }
        if (q.includes("rock")) {
            addMessage('bot', "A <strong>rock</strong> is a solid part of the Earth's surface. There are 3 main types: Igneous, Sedimentary, and Metamorphic! 🪨");
            return;
        }

        // 3. TEXTBOOK SEARCH (Only if it survives the checks above)
        const results = fuse ? fuse.search(query) : [];
        if (results.length > 0) {
            const match = results[0].item.text;
            let response = "Sho chommie 😎<br><br>";
            
            // Keyword triggers for specific "Smart Answers"
            if (q.includes("rust")) {
                response += "🦠 <strong>Rust</strong> = iron + oxygen + water. It makes metal flake away! 💧";
            } else if (q.includes("metal")) {
                response += "🔩 <strong>Metals</strong> are strong, shiny, and conduct electricity! ⚡";
            } else {
                const summary = match.split(/[.!?]/).slice(0, 2).join('.') + '.';
                response += `<strong>💡 From your notes:</strong><br>${summary}`;
            }
            addMessage('bot', response);
        } else {
            addMessage('bot', "Eish chommie, I couldn't find that in the notes. 😅 Try asking about <strong>metals</strong>, <strong>rust</strong>, or <strong>energy</strong>!");
        }
    }, 500);
}

function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = text;
    const box = document.getElementById('messages');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
window.onload = initResources;
</script>
</body>
</html>
