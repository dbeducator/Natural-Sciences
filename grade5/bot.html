<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxi Pie - Science Chommie 🇿🇦</title>

<style>
body { font-family: Arial; margin:0; background:#0a1a33; }

#fab {
 position:fixed; bottom:20px; right:20px;
 width:70px; height:70px;
 background:#10b981; border-radius:50%;
 display:flex; align-items:center; justify-content:center;
 cursor:pointer;
}

#chat { display:none; position:fixed; inset:0; background:#000000cc; }

.container {
 max-width:500px; margin:auto; height:100%;
 display:flex; flex-direction:column;
 background:#f1f5f9;
}

.header {
 background:#0a1a33; color:white; padding:15px;
 display:flex; align-items:center;
}

.messages { flex:1; overflow:auto; padding:15px; }

.msg {
 padding:10px 14px;
 border-radius:15px;
 margin:6px 0;
 max-width:80%;
}

.bot { background:white; }
.user { background:#10b981; color:white; margin-left:auto; }

.input {
 display:flex; padding:10px; background:white;
}

input {
 flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;
}

button { margin-left:5px; }

.quick {
 display:flex; gap:6px; flex-wrap:wrap; margin-top:5px;
}
.quick button {
 background:#e2e8f0; border:none; padding:6px 10px; border-radius:12px;
 cursor:pointer;
}

.typing {
 font-style:italic; opacity:0.6;
}
</style>
</head>

<body>

<div id="fab" onclick="openChat()">🐾</div>

<div id="chat">
<div class="container">

<div class="header">
<b>Maxi Pie 🐾</b>&nbsp; Science Chommie 🇿🇦
<button onclick="closeChat()" style="margin-left:auto">X</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="input" placeholder="Ask me something, chommie..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">Send</button>
</div>

</div>
</div>

<script>
let lastTopic = null;

function add(role, text, quick=[]) {
 const div = document.createElement('div');
 div.className = 'msg ' + role;
 div.innerHTML = text;

 const box = document.getElementById('messages');
 box.appendChild(div);

 // quick replies
 if (quick.length) {
   const qdiv = document.createElement('div');
   qdiv.className = 'quick';
   quick.forEach(q=>{
     const b = document.createElement('button');
     b.innerText = q;
     b.onclick = ()=>{ document.getElementById('input').value = q; send(); };
     qdiv.appendChild(b);
   });
   box.appendChild(qdiv);
 }

 box.scrollTop = box.scrollHeight;
}

function typing() {
 const div = document.createElement('div');
 div.className = 'msg bot typing';
 div.id = 'typing';
 div.innerText = "Maxi Pie is thinking... 🤔";
 document.getElementById('messages').appendChild(div);
}

function stopTyping() {
 const t = document.getElementById('typing');
 if (t) t.remove();
}

function send() {
 const input = document.getElementById('input');
 const text = input.value.trim();
 if (!text) return;

 add('user', text);
 input.value = '';

 typing();

 setTimeout(()=>{
   stopTyping();
   reply(text.toLowerCase());
 }, 600);
}

function reply(q) {

 // HOW ARE YOU
 if (q.includes("how are you")) {
   add('bot', "Sharp sharp 😎 I'm running smoother than a taxi with no traffic! What science are we tackling today?");
   return;
 }

 // GREETING
 if (/^(hi|hello|hey|aweh)/.test(q)) {
   add('bot', "Aweh chommie! 👋 Ready to cook some science? No load shedding here ⚡",
   ["What is a fossil?", "Explain circuits", "Sedimentary rocks"]);
   return;
 }

 // TOPICS
 if (q.includes("fossil")) {
   lastTopic = "fossil";
   add('bot',
   "Fossils are ancient remains or traces of living things 🦖 — like nature's old photo album!",
   ["How are fossils formed?", "Examples of fossils"]);
   return;
 }

 if (q.includes("circuit")) {
   lastTopic = "circuit";
   add('bot',
   "An electrical circuit is a full loop where electricity flows ⚡ — like taxis doing a full route, no shortcuts!",
   ["What if it's broken?", "Types of circuits"]);
   return;
 }

 if (q.includes("sedimentary")) {
   lastTopic = "rocks";
   add('bot',
   "Sedimentary rocks form in layers — like a kota stacked with fillings 😄",
   ["How do layers form?", "Examples"]);
   return;
 }

 if (q.includes("food chain")) {
   lastTopic = "food";
   add('bot',
   "A food chain shows who eats who 🍔➡️🐍➡️🦅",
   ["Producers?", "Consumers?"]);
   return;
 }

 // FOLLOW-UP LOGIC
 if (lastTopic) {
   add('bot', "Nice thinking 👀 you're getting there! Science is all about figuring things out step by step 💪");
   lastTopic = null;
   return;
 }

 // SMART FALLBACK
 const funFallbacks = [
   "Eish 😅 that one dodged me like a taxi skipping a robot!",
   "Yoh that’s a tricky one 👀 try ask it differently",
   "Hau 🤣 my brain just lagged — ask me about fossils, circuits or rocks!"
 ];

 add('bot', funFallbacks[Math.floor(Math.random()*funFallbacks.length)],
 ["Fossils", "Circuits", "Rocks"]);
}

function openChat() {
 document.getElementById('chat').style.display='block';
 if (!document.getElementById('messages').innerHTML) {
   add('bot', "Sho! I'm Maxi Pie 🐾 your science chommie 🇿🇦 Ask me anything!",
   ["What is a fossil?", "Electric circuits", "Food chains"]);
 }
}

function closeChat() {
 document.getElementById('chat').style.display='none';
}
</script>

</body>
</html>
