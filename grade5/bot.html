<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }

        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }

        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }

        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; font-size:18px; }

        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.5; font-size:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }

        .typing-indicator { display:flex; gap:5px; align-items:center; padding:12px 16px; background:white; border-radius:18px; border-bottom-left-radius:2px; align-self:flex-start; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .typing-dot { width:8px; height:8px; background:#10b981; border-radius:50%; animation:bounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay:0.2s; }
        .typing-dot:nth-child(3) { animation-delay:0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:10px 18px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; font-size:14px; }
        .send-btn:disabled { background:#9ca3af; cursor:not-allowed; }

        .image-zoom { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1001; }
        .image-zoom img { max-width:90%; max-height:90%; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Sho! I'm <strong>Maxi Pie</strong> 🐾, your science sidekick! I'm here to help you conquer Grade 5 Natural Sciences. Ask me anything!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="if(event.key==='Enter') handleSend()">
            <button id="sendBtn" onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<div id="image-zoom" class="image-zoom" onclick="this.style.display='none'">
    <img id="zoomed-image" src="" alt="Zoomed Image" />
</div>

<script>
    let knowledgeBase = [];
    let imagesDB = [];
    let fuse = null;
    let isLoading = false;

    // ── PDF loading ──────────────────────────────────────────────────────────

    async function initResources() {
        await initLogicPDF();
        await initLogic2PDF();
    }

    async function initLogicPDF() {
        const url = 'resources/logic.pdf';
        const pdf = await pdfjsLib.getDocument(url).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            knowledgeBase.push({ text: text.replace(/\s+/g, ' '), page: i });
        }
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4, ignoreLocation: true });
    }

    async function initLogic2PDF() {
        try {
            const url = 'resources/logic2.pdf';
            const pdf = await pdfjsLib.getDocument(url).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport }).promise;
                const imgSrc = canvas.toDataURL();
                const title = await getPageTitle(pdf, i);
                imagesDB.push({ src: imgSrc, title: title });
            }
        } catch(e) {
            // logic2.pdf is optional — silently skip if missing
        }
    }

    async function getPageTitle(pdf, pageNumber) {
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        const titles = content.items.map(s => s.str).filter(str => str.trim() !== '');
        return titles.join(" ") || `Image from Page ${pageNumber}`;
    }

    // ── Claude API call ──────────────────────────────────────────────────────

    async function askClaude(userQuestion, pdfContext) {
        const systemPrompt = `You are Maxi Pie 🐾 — a fun, encouraging Grade 5 South African science chatbot.
You speak in a friendly, South African style (use words like "chommie", "sho", "aweh", "eish" occasionally — but don't overdo it, max 1-2 per reply).
You answer questions for Grade 5 learners (age 10-11) based on the South African CAPS curriculum.

Rules:
- Give clear, accurate answers pitched at Grade 5 level
- Use simple language and short sentences  
- Add 1-2 relevant emojis per answer to keep it engaging
- Structure answers in short paragraphs — never a wall of text
- Use the provided textbook context to answer — don't make things up
- Keep answers concise: 3-6 sentences for simple questions, a bit more for complex ones
- Optionally end with a quick fun fact or a word of encouragement
- NEVER dump raw PDF text — always explain in your own words
- Format nicely: use line breaks between paragraphs`;

        const userMessage = `A Grade 5 learner asked: "${userQuestion}"

Here is relevant content from their textbook to help you answer:
---
${pdfContext}
---

Please answer their question clearly and in a Grade 5-friendly way.`;

        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                system: systemPrompt,
                messages: [{ role: "user", content: userMessage }]
            })
        });

        const data = await response.json();
        if (data.content && data.content[0] && data.content[0].text) {
            // Convert newlines to <br> for HTML display
            return data.content[0].text.replace(/\n/g, '<br>');
        }
        throw new Error("No response from Claude");
    }

    // ── UI helpers ───────────────────────────────────────────────────────────

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing-indicator';
        div.id = 'typing';
        div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function hideTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    // ── Main send handler ────────────────────────────────────────────────────

    async function handleSend() {
        if (isLoading) return;
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query) return;

        addMessage('user', query);
        input.value = '';

        const q = query.toLowerCase();

        // Quick replies — no API call needed
        const greetings = ["hi", "hello", "hey", "aweh", "howzit", "hola"];
        if (greetings.some(g => q === g || q.startsWith(g + ' ') || q.startsWith(g + '!'))) {
            addMessage('bot', "Aweh chommie! 👋 Ready to smash some Grade 5 science? What topic can I help you with today?");
            return;
        }
        if (q.includes("how are you") || q.includes("how's it") || q.includes("hoe gaan dit")) {
            addMessage('bot', "I'm buzzing with energy! ⚡ Ready to answer all your science questions. What's on your mind, chommie?");
            return;
        }

        // Image lookup
        const imageMatch = imagesDB.find(img => q.includes(img.title.toLowerCase()));
        if (imageMatch) {
            addMessage('bot', `Sho chommie! Here's an image related to your question:<br>
                <img src="${imageMatch.src}" style="max-width:100%;border-radius:10px;margin-top:10px;cursor:pointer;"
                onclick="zoomImage('${imageMatch.src}')" title="${imageMatch.title}">
                <br><small>${imageMatch.title}</small>`);
            return;
        }

        // Science question → search PDF → ask Claude
        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        showTyping();

        try {
            let pdfContext = "";
            if (fuse) {
                const results = fuse.search(query, { limit: 3 });
                if (results.length > 0) {
                    pdfContext = results.map(r => r.item.text).join('\n\n---\n\n').substring(0, 3000);
                }
            }

            if (!pdfContext) {
                hideTyping();
                addMessage('bot', "Eish chommie! I couldn't find that in our textbook. 😅 Try asking about topics like <strong>rocks</strong>, <strong>electricity</strong>, <strong>metals</strong>, <strong>food chains</strong>, or <strong>fossils</strong>!");
            } else {
                const reply = await askClaude(query, pdfContext);
                hideTyping();
                addMessage('bot', reply);
            }
        } catch (err) {
            hideTyping();
            console.error(err);
            addMessage('bot', "Eish, something went wrong on my side. 😬 Give it another try chommie!");
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function zoomImage(src) {
        document.getElementById('zoomed-image').src = src;
        document.getElementById('image-zoom').style.display = 'flex';
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }

    window.onload = initResources;
</script>

</body>
</html>
