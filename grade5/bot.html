<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }
        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }
        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }
        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }
        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:10px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Aweh! I'm <strong>Maxi Pie</strong> 🐾. Ready to crush all 19 Science topics with the Neshehe family? Let's go! 🔥</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="handleTyping(event)">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let fuse = null;
    let activeFollowUp = null;

    async function initResources() {
        const files = ['resources/logic.pdf', 'resources/logic2.pdf'];
        for (const url of files) {
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');
                    knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
                }
            } catch (e) { console.warn("PDF missing:", url); }
        }
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4 });
    }

    function handleTyping(event) { if (event.key === 'Enter') handleSend(); }

    function handleSend() {
        const input = document.getElementById('userInput');
        const userQueryRaw = input.value.trim();
        if (!userQueryRaw) return;

        addMessage('user', userQueryRaw);
        input.value = '';

        setTimeout(() => {
            const q = userQueryRaw.toLowerCase();

            // 1. GREETINGS, JOKES & FAM
            if (["hi", "hello", "hey", "aweh", "sho", "howzit", "shap"].some(w => q === w || q.startsWith(w + " "))) {
                addMessage('bot', "Aweh chommie! 👋 Ready to smash Science? Tell me a topic or ask for a joke!");
                activeFollowUp = null;
                return;
            }
            if (q.includes("joke")) {
                const jokes = ["Why can't you trust an atom? They make up everything! 😂", "What is a skeleton's favorite instrument? A trombone! 🦴"];
                addMessage('bot', jokes[Math.floor(Math.random()*jokes.length)]);
                return;
            }
            if (q.includes("leslee") || q.includes("linda") || q.includes("alexis") || q.includes("sadee")) {
                addMessage('bot', "Shoutout to the <strong>Venda Girls</strong>! 🇿🇦 Let's keep the Neshehe legacy strong with some A+ answers!");
                return;
            }

            // 2. IF WAITING FOR AN ANSWER, PROVIDE THE "REAL DEAL"
            if (activeFollowUp) {
                addMessage('bot', `<strong>Nice one chommie! 🌟 Here's the actual science:</strong><br>${activeFollowUp.explanation}`);
                activeFollowUp = null;
                return;
            }

            // 3. THE 19 DBE TOPIC DATABASE
            const topics = [
                { keys: ['plants', 'animals', 'earth'], answer: "Plants and animals live in different habitats. Plants make their own food, but animals must find it! 🌿", followUp: "What do we call an animal that only eats plants?", explanation: "That's an <strong>Herbivore</strong>! 🦒 Like a giraffe or a cow." },
                { keys: ['skeleton', 'bone'], answer: "Skeletons give us support and protect our soft organs like the heart and brain. 💀", followUp: "Which bones protect your lungs?", explanation: "The <strong>Rib Cage</strong>! It's like a built-in suit of armor for your chest." },
                { keys: ['food chain'], answer: "Food chains show how energy moves from plants (producers) to animals (consumers). 🦗", followUp: "Where does all energy in a food chain start?", explanation: "It starts with the <strong>Sun</strong>! ☀️ Plants use sunlight to grow, then animals eat the plants." },
                { keys: ['life cycle'], answer: "A life cycle shows the stages a living thing goes through, from birth to growing up and having babies. 🐣", followUp: "What is the first stage of a frog's life cycle?", explanation: "It's an <strong>Egg</strong>, which then turns into a tadpole! 🐸" },
                { keys: ['metal', 'non-metal'], answer: "Metals are shiny, strong, and carry heat. Non-metals are usually dull and don't conduct well. 🔩", followUp: "Is iron a metal or a non-metal?", explanation: "Iron is a <strong>Metal</strong>! That's why we use it for strong things like gates and cars." },
                { keys: ['circuit', 'electricity'], answer: "A circuit is a loop that electricity follows. If it's broken, the power won't flow! ⚡", followUp: "What part of a circuit provides the energy?", explanation: "The <strong>Battery</strong> (or Cell)! 🔋 It's the 'power house' of the loop." },
                { keys: ['sedimentary', 'rock'], answer: "Sedimentary rocks form in layers from mud and sand squashed over millions of years. 🥞", followUp: "What is often found trapped inside these layers?", explanation: "<strong>Fossils</strong>! 🦴 They get stuck in the mud before it turns to stone." },
                { keys: ['fossil'], answer: "Fossils are the remains of plants and animals that lived a long, long time ago. 🦕", followUp: "What do we call a scientist who studies fossils?", explanation: "A <strong>Paleontologist</strong>! 🔬 They are like history detectives." },
                { keys: ['earth moves', 'rotation'], answer: "The Earth spins on its axis (rotation) causing day and night, and orbits the sun causing seasons! 🌍", followUp: "How long does it take for Earth to spin once?", explanation: "Exactly <strong>24 hours</strong>! That's why we have one day and one night every day." },
                { keys: ['surface of the earth', 'crust'], answer: "The Earth's surface is made of a thin layer of rock called the crust. ⛰️", followUp: "What is the layer under the crust called?", explanation: "The <strong>Mantle</strong>! It's much thicker and hotter than the crust." }
            ];

            let matched = false;
            for (const t of topics) {
                if (t.keys.some(k => q.includes(k))) {
                    addMessage('bot', t.answer);
                    setTimeout(() => {
                        addMessage('bot', `<em>Thinking question: ${t.followUp}</em>`);
                        activeFollowUp = t; 
                    }, 800);
                    matched = true;
                    break;
                }
            }
            if (matched) return;

            // 4. FUZZY PDF SEARCH
            const results = fuse ? fuse.search(userQueryRaw) : [];
            if (results.length > 0) {
                addMessage('bot', `Sho chommie, I found this in the notes: <br><br> "<em>${results[0].item.text.substring(0, 300)}...</em>"`);
            } else {
                addMessage('bot', "Eish chommie! My brain just had a load-shedding moment. 🕯️ Try asking about <strong>skeletons</strong>, <strong>circuits</strong>, or <strong>fossils</strong>!");
            }
        }, 500);
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources;
</script>
</body>
</html>
