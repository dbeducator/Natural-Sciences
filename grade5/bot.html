<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        /* Styles remain the same for consistency */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }
        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; }
        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }
        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }
        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; }
        .send-btn { background:#10b981; color:white; border:none; padding:0 20px; border-radius:25px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()">
    <img src="cat_full.png" alt="Maxi Pie">
</div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png" alt="Maxi Pie">
            <div><h3 style="margin:0;">Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button style="margin-left:auto; background:red; color:white; border:none; border-radius:50%; width:30px; height:30px;" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Sho! I'm Maxi Pie 🐾 Ask me anything about Science!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') handleSend()">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let fuse = null;

    async function initResources() {
        const files = [{ path: 'resources/logic.pdf', type: 'pdf' }];
        for (const file of files) {
            try {
                const res = await fetch(file.path);
                if (!res.ok) continue;
                const buffer = await res.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');
                    knowledgeBase.push({ text: text.replace(/\s+/g, ' '), source: 'PDF' });
                }
            } catch (e) { console.error(e); }
        }
        // STRICTER THRESHOLD (0.3) means it only picks a result if it's a very good match
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.3, ignoreLocation: true });
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query) return;

        addMessage('user', query);
        input.value = '';

        setTimeout(() => {
            const q = query.toLowerCase();

            // 1. GREETINGS & PERSONALITY
            if (q.includes("hi") || q.includes("hello") || q.includes("sho")) {
                addMessage('bot', "Aweh chommie! 👋 Ready to learn? Ask me a Science question!");
                return;
            }
            if (q.includes("who are you")) {
                addMessage('bot', "I'm <strong>Maxi Pie</strong> 🐾, your Science chommie! I've read your Metals and Non-metals notes. 🔥");
                return;
            }

            // 2. THE SEARCH (Strict)
            const results = fuse ? fuse.search(query) : [];
            
            if (results.length > 0) {
                const match = results[0].item;
                const sentences = match.text.split(/[.!?]/);
                const summary = sentences.slice(0, 3).join('.') + '.';
                addMessage('bot', `<strong>💡 From your notes:</strong><br>${summary}`);
            } else {
                // 3. FALLBACK FOR GENERAL SCIENCE (When PDF doesn't match)
                if (q.includes("tree")) {
                    addMessage('bot', "A tree is a tall plant with a wooden trunk and leaves. Trees use sunlight to make food! 🌳");
                } else if (q.includes("planet")) {
                    addMessage('bot', "A planet is a large round object in space that travels around a star (like our Sun). Earth is our home planet! 🌍");
                } else if (q.includes("battery")) {
                    addMessage('bot', "A battery stores chemical energy and turns it into electricity to power things like toys or torches! 🔋");
                } else {
                    addMessage('bot', "Eish chommie, I couldn't find that in your notes. Try asking about 'metals', 'rust', or 'conductors'! 🐾");
                }
            }
        }, 500);
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources;
</script>
</body>
</html>
