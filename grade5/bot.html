<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background:transparent; height: 100vh; overflow: hidden; }
        
        /* Floating Button */
        #maxi-fab { position:fixed; bottom:25px; right:25px; width:70px; height:70px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:3px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }

        /* Full Screen Modal for Niotron */
        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.9); z-index:1000; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }
        
        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; }

        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }

        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; align-items:center; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .mic-btn { background:#3b82f6; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .send-btn { background:#10b981; color:white; border:none; padding:0 20px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; }
        
        .content-img { width:100%; border-radius:10px; margin-top:10px; border:1px solid #ddd; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()">
    <img src="cat_full.png" alt="Maxi Pie">
</div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png" alt="Maxi Pie">
            <div>
                <h3 style="margin:0;font-size:1.1rem;">Maxi Pie</h3>
                <small style="color:#10b981">Grade 5 Science Assistant 🇿🇦</small>
            </div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>

        <div id="messages" class="chat-messages">
            <div class="msg bot">Aweh! I've loaded your notes. Ask me anything about your Science lesson! 🐾</div>
        </div>

        <div class="chat-input-area">
            <button id="micBtn" class="mic-btn">🎤</button>
            <input type="text" id="userInput" placeholder="Type here..." onkeypress="if(event.key==='Enter') handleSend()">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let fuse = null;
    let modalOpen = false;

    // 1. NAVIGATION (Niotron Back Button Compatible)
    function openChat() {
        modalOpen = true;
        document.getElementById('chat-modal').style.display = 'block';
        window.history.pushState({ modal: "open" }, "");
    }

    function closeChat() {
        modalOpen = false;
        document.getElementById('chat-modal').style.display = 'none';
        if (window.history.state && window.history.state.modal === "open") {
            window.history.back();
        }
    }

    window.onpopstate = function(event) {
        if (modalOpen) {
            modalOpen = false;
            document.getElementById('chat-modal').style.display = 'none';
        }
    };

    // 2. RESOURCE LOADING
    async function initResources() {
        const files = [
            { path: 'resources/logic.pdf', type: 'pdf' },
            { path: 'resources/logic2.html', type: 'html' },
            { path: 'resources/logic3.html', type: 'html' }
        ];

        for (const file of files) {
            try {
                const res = await fetch(file.path);
                if (!res.ok) continue;

                if (file.type === 'pdf') {
                    const buffer = await res.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const text = content.items.map(s => s.str).join(' ');
                        knowledgeBase.push({ text: text.replace(/\s+/g, ' '), source: 'PDF', page: i });
                    }
                } else {
                    const html = await res.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    // Indexing individual blocks in HTML for better image matching
                    const blocks = doc.querySelectorAll('div, section, p');
                    blocks.forEach(b => {
                        const text = b.innerText.trim();
                        if (text.length > 30) {
                            const images = Array.from(b.querySelectorAll('img')).map(img => img.src);
                            knowledgeBase.push({ text, source: 'HTML', images });
                        }
                    });
                }
            } catch (e) { console.warn("Resource missing:", file.path); }
        }

        fuse = new Fuse(knowledgeBase, {
            keys: ['text'],
            threshold: 0.4,
            ignoreLocation: true
        });
    }

    // 3. LOGIC & FORMATTING
    function smartFormat(text, query) {
        const q = query.toLowerCase();
        let response = "Sho chommie 😎<br><br>";

        // DIRECT ANSWERS
        if (q.includes("rust")) {
            response += "🦠 <strong>Rust explained:</strong><br>";
            response += "Rust happens when iron reacts with oxygen and water.<br>";
            response += "👉 Iron + oxygen + water → rust<br><br>";
            response += "💡 It flakes off, so the metal keeps getting damaged.";
            return response;
        }

        if (q.includes("metal")) {
            response += "🔩 <strong>Metals basics:</strong><br>";
            response += "• Conduct electricity ⚡<br>";
            response += "• Conduct heat 🌡️<br>";
            response += "• Malleable & ductile 🔨<br><br>";
            response += "🇿🇦 SA example: Gold from Witwatersrand";
            return response;
        }

        // GENERAL SUMMARY
        const sentences = text.split(/[.!?]/);
        const short = sentences.slice(0, 3).join('.') + '.';
        response += `<strong>💡 Quick Answer:</strong><br>${short}<br><br>`;

        const bullets = text.match(/(✨|⚡|🌡️|🔨|🧵|🔔|💧|🇿🇦|🥇|⚪|🔌|🏗️|✈️).*/g);
        if (bullets) {
            response += "<strong>⚙️ Key Points:</strong><br>";
            bullets.slice(0, 5).forEach(b => { response += "• " + b + "<br>"; });
        }

        response += "<br><em>Ask me something specific like 'rust' or 'gold' 👍</em>";
        return response;
    }

    function fallbackResponse(query) {
        return `Eish 😅 I couldn't find "${query}" exactly.<br><br>
        Try asking like this:<br>
        • "What is rust?"<br>
        • "Uses of metals"<br>
        • "Where is gold found?"<br><br>
        I'm still learning, chommie 🐾`;
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query || !fuse) return;

        addMessage('user', query);
        input.value = '';

        setTimeout(() => {
            const results = fuse.search(query);
            if (results.length === 0) {
                addMessage('bot', fallbackResponse(query));
                return;
            }

            const match = results[0].item;
            let response = smartFormat(match.text, query);

            if (match.images && match.images.length > 0) {
                response += `<br><img src="${match.images[0]}" class="content-img">`;
            }

            addMessage('bot', response);
        }, 600);
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // 4. VOICE
    if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-ZA';
        document.getElementById('micBtn').onclick = () => {
            recognition.start();
            document.getElementById('micBtn').style.background = 'red';
        };
        recognition.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            document.getElementById('micBtn').style.background = '#3b82f6';
            handleSend();
        };
        recognition.onerror = () => document.getElementById('micBtn').style.background = '#3b82f6';
    }

    window.onload = initResources;
</script>
</body>
</html>
