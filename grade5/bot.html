<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }

        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }

        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }

        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; }

        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }

        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:10px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Aweh! I'm <strong>Maxi Pie</strong> 🐾. I’m here to help you conquer science like a pro. Ask me anything!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="handleTyping(event)">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let fuse = null;
    let awaitingFollowUp = false;

    async function initResources() {
        const files = ['resources/logic.pdf', 'resources/logic2.pdf'];
        for (const url of files) {
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');
                    knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
                }
            } catch (e) { console.warn("PDF failed to load:", url); }
        }
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4 });
    }

    function handleTyping(event) { if (event.key === 'Enter') handleSend(); }

    function handleSend() {
        const input = document.getElementById('userInput');
        const userQueryRaw = input.value.trim();
        if (!userQueryRaw) return;

        addMessage('user', userQueryRaw);
        input.value = '';

        setTimeout(() => {
            const q = userQueryRaw.toLowerCase();

            // 1. EXTENDED GREETINGS & PERSONALITY
            const greetings = ["hi", "hello", "hey", "aweh", "sho", "shap", "howzit", "dumelang", "ndaa"];
            if (greetings.some(word => q === word || q.startsWith(word + " "))) {
                const responses = [
                    "Aweh chommie! 👋 Ready to make these Science notes your step-son?",
                    "Sho! I'm feeling sharper than a new pencil. What's on the menu today?",
                    "Heita! Ready to learn? Science is just magic that actually works! ✨"
                ];
                addMessage('bot', responses[Math.floor(Math.random() * responses.length)]);
                return;
            }

            // 2. THE NESHEHE FAMILY BRAIN (Legacy & Identity)
            if (q.includes("leslee") || q.includes("linda") || q.includes("alexis") || q.includes("sadee") || q.includes("neshehe")) {
                addMessage('bot', "Ah, the <strong>Neshehe Family Legacy</strong>! 🇿🇦 Whether it's Leslee, Linda, Alexis, or Sadee, we're all about that excellence! Just like a strong skeleton, this family holds everything together. 🔥");
                return;
            }

            // 3. JOKES (Science Style)
            if (q.includes("joke")) {
                const jokes = [
                    "Why can't you trust an atom? Because they make up everything! 😂",
                    "What did the science book say to the student? 'I've got a lot of problems.' 📖",
                    "Why did the skeleton go to the party alone? He had no-body to go with! 💀",
                    "What is a chemist's favorite tree? A chemistree! 🌲"
                ];
                addMessage('bot', jokes[Math.floor(Math.random() * jokes.length)]);
                return;
            }

            // 4. FOLLOW-UP LOGIC
            if (awaitingFollowUp) {
                awaitingFollowUp = false;
                addMessage('bot', "Sharp answer! 🌟 You're actually making sense. Do you want to dive deeper into this, or should we tackle a new topic?");
                return;
            }

            // 5. TOPIC MATCHING
            const topics = [
                { keys: ['skeleton', 'bone'], answer: "The skeleton is your body's inner frame. Without it, you'd just be a puddle of jelly on the floor! It protects your brain and heart. 💀", followUp: "Can you name one bone that protects your heart?" },
                { keys: ['rust', 'metal'], answer: "Rust is like metal-cancer. 🦠 It happens when iron meets oxygen and water. It flakes off and makes the metal weak!", followUp: "How can we stop a gate from rusting?" },
                { keys: ['fossil'], answer: "Fossils are basically stone 'selfies' from millions of years ago! They are remains of plants or animals trapped in sedimentary rock. 🦴", followUp: "Have you ever found a cool rock that looked like a shell?" },
                { keys: ['circuit', 'battery'], answer: "An electrical circuit is like a one-way street for energy. If there's a gap in the wire, the lights go out—just like load-shedding! 🕯️", followUp: "What happens if we put two batteries in a circuit instead of one?" }
            ];

            let matched = false;
            for (const topic of topics) {
                if (topic.keys.some(key => q.includes(key))) {
                    addMessage('bot', topic.answer);
                    setTimeout(() => {
                        addMessage('bot', `<em>Thinking question:</em> ${topic.followUp}`);
                        awaitingFollowUp = true;
                    }, 1000);
                    matched = true;
                    break;
                }
            }

            if (matched) return;

            // 6. FUZZY SEARCH FALLBACK
            const results = fuse ? fuse.search(userQueryRaw) : [];
            if (results.length > 0) {
                const matchText = results[0].item.text.substring(0, 350) + "...";
                addMessage('bot', `Sho chommie, I found this in your notes: <br><br> "<em>${matchText}</em>" <br><br> Does that make sense, or should I explain it like a meme? 😂`);
            } else {
                addMessage('bot', "Eish chommie! My brain just had a load-shedding moment. 🕯️ I couldn't find that in the notes. <br><br> Try asking about <strong>skeletons</strong>, <strong>rust</strong>, or <strong>circuits</strong>!");
            }
        }, 500);
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources;
</script>
</body>
</html>
