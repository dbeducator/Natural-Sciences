<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }

        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }

        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }

        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; }

        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }

        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:10px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; }

        .image-zoom { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.8); 
            align-items: center; 
            justify-content: center; 
            z-index: 1001; 
        } 
        .image-zoom img { 
            max-width: 90%; 
            max-height: 90%; 
        } 
        .image-zoom:target { display: flex; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Sho! I'm <strong>Maxi Pie</strong> 🐾, your science sidekick! I’m here to help you conquer the world of science. Ask me anything!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="if(event.key==='Enter') handleSend()">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<div id="image-zoom" class="image-zoom" onclick="this.style.display='none'">
    <img id="zoomed-image" src="" alt="Zoomed Image" />
</div>

<script>
    let knowledgeBase = [];
    let imagesDB = [];
    let fuse = null;
    let personalInquiryCount = 0; // Counter for personal questions

    async function initResources() {
        await initLogicPDF(); // Load primary knowledge base from the first PDF
        await initLogic2PDF(); // Load additional resources from the second PDF
    }

    async function initLogicPDF() {
        const url = 'resources/logic.pdf';
        const pdf = await pdfjsLib.getDocument(url).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
        }
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4, ignoreLocation: true });
    }

    async function initLogic2PDF() {
        const url = 'resources/logic2.pdf';
        const pdf = await pdfjsLib.getDocument(url).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            const context = canvas.getContext('2d');
            await page.render({ canvasContext: context, viewport }).promise;

            const imgSrc = canvas.toDataURL(); // Get the image as data URL from the PDF
            const title = await getPageTitle(pdf, i); // Extract title for the image
            imagesDB.push({ src: imgSrc, title: title }); // Store image and title
        }
    }

    async function getPageTitle(pdf, pageNumber) {
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        const titles = content.items.map(s => s.str).filter(str => str.trim() !== '');
        return titles.join(" ") || `Image from Page ${pageNumber}`; // Fallback title if none found
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query) return; // Exit if input is empty

        addMessage('user', query); // Display the user's message
        input.value = ''; // Clear the input box
        
        setTimeout(() => {
            const q = query.toLowerCase(); // Normalize the query for comparison
            
            // Greeting handling
            const greetings = ["hi", "hello", "hey chommie", "aweh"];
            if (greetings.some(greet => q.includes(greet))) {
                addMessage('bot', "Aweh chommie! 👋 Ready to smash some science? What's the topic today?");
                return;
            }

            // How are you responses
            if (q.includes("how are you") || q.includes("how's it going")) {
                addMessage('bot', "I'm buzzing with energy! 😎 How can I help you today?");
                return;
            }

            // Answering specific science questions
            const basicResponses = {
                "types of rocks": "The three main types of rocks are igneous, sedimentary, and metamorphic.",
                "what is a sedimentary rock": "Sedimentary rocks are formed from the accumulation of sediments, which are small particles of other rocks, minerals, or organic materials.",
                "what is electricity": "Electricity is the flow of electric charge, usually carried by moving electrons.",
                "what are metals": "Metals are solid materials that are good conductors of heat and electricity. Common examples include iron, aluminum, and copper.",
                "what are bones used for": "Bones provide structure to the body, protect organs, and allow movement.",
                "fossils": "Fossils are the preserved remains or traces of organisms that lived in the past."
            };

            // Retrieves a fixed or matched response
            const response = basicResponses[q] || Object.keys(basicResponses).find(key => q.includes(key)) && basicResponses[key];
            if (response) {
                addMessage('bot', response);
                return;
            }

            // Specific image queries (based on titles)
            const specificImageMatch = imagesDB.find(img => q.includes(img.title.toLowerCase()));
            if (specificImageMatch) {
                addMessage('bot', `Sho chommie! Here’s the image related to your request:<br>` +
                    `<img src="${specificImageMatch.src}" style="max-width:100%;border-radius:10px;margin-top:10px;" onclick="zoomImage('${specificImageMatch.src}')" title="${specificImageMatch.title}">` +
                    `<br><small>${specificImageMatch.title}</small>`);
                return;
            }

            // Quiz trigger
            if (q.includes('quiz') || q.includes('test me') || q.includes('ask me a question') || q.includes('assessment')) {
                startQuiz();
                return;
            }

            // If in quiz mode, user just answered — show textbook answer
            if (quizMode && currentQuiz) {
                const qText = currentQuiz.question;
                const aText = currentQuiz.answer;
                quizMode = false;
                currentQuiz = null;
                addMessage('bot', `Nice try chommie! 💪 Here's what the textbook says:<br><br><strong>Q: ${qText}</strong><br><br>${aText}<br><br>Say <strong>quiz me</strong> for another one!`);
                return;
            }

            // General knowledge queries through fuzzy matching
            const results = fuse.search(query, { limit: 5 });
            if (results.length > 0) {
                const rawText = results.map(r => r.item.text).join(' ');
                addMessage('bot', formatAnswer(query, rawText));
            } else {
                addMessage('bot', "Eish, chommie! I couldn't find that in the notes. 😅 Try asking about <strong>rocks</strong>, <strong>fossils</strong>, <strong>electricity</strong>, <strong>metals</strong>, <strong>skeletons</strong>, or <strong>food chains</strong>!");
            }
        }, 500); // Delay for simulated processing time
    }

    // Quiz state
    let quizMode = false;
    let currentQuiz = null;

    function startQuiz() {
        if (!knowledgeBase.length) {
            addMessage('bot', "Eish, still loading the textbook! 😅 Try again in a sec.");
            return;
        }

        const qaPairs = [];
        knowledgeBase.forEach(chunk => {
            const text = chunk.text;
            // Match a question followed by answer content
            const matches = text.match(/([A-Z][^?]{15,}[?])\s*([^?]{30,}[.!])/g);
            if (matches) {
                matches.forEach(m => {
                    const parts = m.match(/^([^?]+[?])\s*(.+)$/s);
                    if (parts && parts[1] && parts[2]) {
                        const q = parts[1].trim();
                        const a = parts[2].trim().substring(0, 400);
                        // Skip activity/navigation/diagram instructions
                        const skip = /^(Do you|Can you|Look at|Think about|Draw|After you|Consider|Which cheek|Which direction|Stand facing|Turn to your|ACTIVITY|NatSci)/i.test(q);
                        // Must be a proper science question with substance
                        const hasContent = q.length > 20 && a.length > 30;
                        if (!skip && hasContent) {
                            qaPairs.push({ question: q, answer: a });
                        }
                    }
                });
            }
        });

        if (qaPairs.length === 0) {
            addMessage('bot', "Eish, I couldn't pull a question right now. 😅 Try asking me a topic!");
            return;
        }

        const pick = qaPairs[Math.floor(Math.random() * qaPairs.length)];
        quizMode = true;
        currentQuiz = pick;
        addMessage('bot', `🧠 Quiz time chommie!<br><br><strong>${pick.question}</strong><br><br>Type your answer — then I'll show you what the textbook says!`);
    }
    function formatAnswer(query, rawText) {
        const q = query.toLowerCase();

        // Light cleaning — only remove clear PDF artifacts, keep content intact
        const cleaned = rawText
            .replace(/NatSci&Tech_Gr5_TG_Book\.indb[^\n]*/g, '')
            .replace(/\b(Life and living|Matter and materials|Energy and change|Planet Earth and beyond)\s+\d+\b/gi, '')
            .replace(/Chapter \d+:[^\n]{0,60}/g, '')
            .replace(/•\s*/g, '')
            .replace(/\s{2,}/g, ' ')
            .trim();

        // Split into sentences
        const allSentences = (cleaned.match(/[^.!?]{10,}[.!?]+/g) || []).map(s => s.trim()).filter(s => s.length > 15);

        // Keywords from query — include short words too
        const stopWords = new Set(['what','is','are','the','how','why','does','a','an','of','in','do','for','and','or']);
        const keywords = q.replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 1 && !stopWords.has(w));

        // Activity/instruction sentence filter
        const isInstruction = s => /^(do you|can you|look at|think about|draw|after you|consider|stand facing|turn to|which cheek|which direction|discuss|label|number the|use the diagram|complete the|copy the)/i.test(s.trim());

        // Score sentences
        const scored = allSentences.map(s => {
            if (isInstruction(s)) return { s, score: -5 };
            const sl = s.toLowerCase();
            const kwScore = keywords.reduce((n, kw) => n + (sl.includes(kw) ? 3 : 0), 0);
            const bonus = (s.length > 35 && s.length < 400) ? 1 : 0;
            return { s, score: kwScore + bonus };
        });

        // Get top scoring relevant sentences
        const relevant = scored.filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 4).map(x => x.s);

        // Fallback: if no keyword hits, take first clean sentences
        const picks = relevant.length > 0 ? relevant
            : allSentences.filter(s => !isInstruction(s) && s.length > 35).slice(0, 3);

        if (picks.length === 0) {
            return "Eish chommie, I found something but it's a bit garbled. 😅 Try asking differently!";
        }

        const emoji = q.includes('rock') || q.includes('sediment') ? '🪨'
                    : q.includes('fossil') ? '🦕'
                    : q.includes('electr') || q.includes('circuit') || q.includes('batter') ? '⚡'
                    : q.includes('metal') ? '🔩'
                    : q.includes('plant') || q.includes('food chain') || q.includes('photosyn') ? '🌿'
                    : q.includes('animal') ? '🐾'
                    : q.includes('skeleton') || q.includes('bone') ? '🦴'
                    : q.includes('earth') || q.includes('season') || q.includes('planet') ? '🌍'
                    : q.includes('energy') || q.includes('fuel') || q.includes('coal') ? '🔥'
                    : q.includes('water') || q.includes('cloud') || q.includes('rain') ? '💧'
                    : q.includes('struct') ? '🏗️'
                    : q.includes('material') ? '🧱'
                    : q.includes('producer') || q.includes('consumer') ? '🌿'
                    : '🔬';

        return `Sho chommie! ${emoji} Here's what the textbook says:<br><br>` + picks.join('<br><br>');
    }
    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight; // Scroll to the latest message
    }

    function zoomImage(src) {
        const zoomedImage = document.getElementById('zoomed-image');
        zoomedImage.src = src;
        document.getElementById('image-zoom').style.display = 'flex'; // Show the zoomed image
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources; // Load resources when the window is ready
</script>

</body>
</html>
