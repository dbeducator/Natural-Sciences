<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maxi Pie - Grade 5 Science Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0a1a33; height: 100vh; overflow: hidden; }
        #maxi-fab { position:fixed; bottom:25px; right:25px; width:75px; height:75px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:999; border:4px solid #fff; }
        #maxi-fab img { width:85%; height:85%; border-radius:50%; object-fit: cover; }
        #chat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 7, 12, 0.95); z-index:1000; }
        .chat-container { display:flex; flex-direction:column; height:100%; width:100%; max-width:500px; margin:0 auto; background:#f0f4f8; }
        .chat-header { background:#0a1a33; padding:15px; display:flex; align-items:center; gap:12px; color:white; border-bottom:3px solid #10b981; }
        .chat-header img { width:45px; height:45px; border-radius:50%; border:2px solid #10b981; }
        .close-btn { margin-left:auto; background:#ef4444; color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold; cursor:pointer; }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; line-height:1.4; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self:flex-start; background:white; color:#333; border-bottom-left-radius:2px; }
        .user { align-self:flex-end; background:#10b981; color:white; border-bottom-right-radius:2px; }
        .chat-input-area { padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #ddd; }
        .chat-input-area input { flex:1; padding:12px; border-radius:25px; border:1px solid #ccc; outline:none; font-size:16px; }
        .send-btn { background:#10b981; color:white; border:none; padding:10px; height:45px; border-radius:25px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="maxi-fab" onclick="openChat()"><img src="cat_full.png"></div>

<div id="chat-modal">
    <div class="chat-container">
        <div class="chat-header">
            <img src="cat_full.png">
            <div><h3>Maxi Pie</h3><small style="color:#10b981">Science Chommie 🇿🇦</small></div>
            <button class="close-btn" onclick="closeChat()">×</button>
        </div>
        <div id="messages" class="chat-messages">
            <div class="msg bot">Aweh! I'm <strong>Maxi Pie</strong> 🐾. Ready to crush all 19 DBE Science topics with the Neshehe family? Let's go! 🔥</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask me something, chommie..." onkeypress="handleTyping(event)">
            <button onclick="handleSend()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let fuse = null;
    let activeFollowUp = null;

    async function initResources() {
        const files = ['resources/logic.pdf', 'resources/logic2.pdf'];
        for (const url of files) {
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');
                    knowledgeBase.push({ text: text.replace(/\s+/g, ' ') });
                }
            } catch (e) { console.warn("PDF missing:", url); }
        }
        fuse = new Fuse(knowledgeBase, { keys: ['text'], threshold: 0.4 });
    }

    function handleTyping(event) { if (event.key === 'Enter') handleSend(); }

    function handleSend() {
        const input = document.getElementById('userInput');
        const userQueryRaw = input.value.trim();
        if (!userQueryRaw) return;

        addMessage('user', userQueryRaw);
        input.value = '';

        setTimeout(() => {
            const q = userQueryRaw.toLowerCase();

            // 1. IMPROVED GREETING LOGIC
            const greetings = ["hi", "hello", "hey", "aweh", "sho", "howzit", "shap", "how are you"];
            if (greetings.some(word => q.includes(word))) {
                addMessage('bot', "Aweh chommie! 👋 I'm sharp sharp and ready to help Leslee and the family smash Science! What's the topic for today?");
                activeFollowUp = null;
                return;
            }

            // 2. IF WAITING FOR AN ANSWER
            if (activeFollowUp) {
                addMessage('bot', `<strong>Nice one chommie! 🌟 Here is the real deal:</strong><br>${activeFollowUp.explanation}`);
                activeFollowUp = null;
                return;
            }

            // 3. THE 19 DBE TOPIC DATABASE
            const topics = [
                { keys: ['plants and animals', 'habitats'], answer: "Plants and animals live together in ecosystems. Plants are producers because they make food! 🌿", followUp: "What do we call an animal that only eats plants?", explanation: "That's an <strong>Herbivore</strong>! 🦒 Like a giraffe or a springbok." },
                { keys: ['animal skeleton'], answer: "Animals have different skeletons. Some are inside (endoskeleton) and some are outside (exoskeleton)! 🦴", followUp: "Does a crab have its skeleton on the inside or outside?", explanation: "On the <strong>Outside</strong>! 🦀 It's called an exoskeleton, like a suit of armor." },
                { keys: ['skeleton as structure', 'frame'], answer: "Skeletons are frame structures that support the body and protect organs. 💀", followUp: "Which bones protect your lungs?", explanation: "The <strong>Rib Cage</strong>! 🫁 It keeps your lungs and heart safe." },
                { keys: ['food chain'], answer: "Food chains show how energy flows from the sun to plants, then to animals. 🦗", followUp: "What do all food chains start with?", explanation: "The <strong>Sun</strong>! ☀️ It gives energy to the plants to grow." },
                { keys: ['life cycle'], answer: "Life cycles show the stages of growth, like an egg turning into a bird. 🐣", followUp: "What is the first stage of a frog's life cycle?", explanation: "The <strong>Egg</strong>! 🐸 Then it becomes a tadpole before turning into a frog." },
                { keys: ['metal', 'non-metal'], answer: "Metals are shiny and strong. Non-metals are usually dull and can break easily. 🔩", followUp: "Is a gold coin a metal or non-metal?", explanation: "It's a <strong>Metal</strong>! 💰 It's shiny and conducts heat well." },
                { keys: ['uses of metal'], answer: "We use metals for things that need to be strong, like bridges, cars, and pots. 🏗️", followUp: "Why do we use metal for cooking pots?", explanation: "Because metals <strong>conduct heat</strong>! 🔥 They let the heat get to the food quickly." },
                { keys: ['processing materials'], answer: "We process materials to make them better, like turning clay into hard bricks! 🧱", followUp: "What do we do to clay to make it a hard brick?", explanation: "We <strong>fire it</strong> in a very hot oven called a kiln! 🔥" },
                { keys: ['cells and batteries'], answer: "Cells and batteries store chemical energy to power our gadgets. 🔋", followUp: "What do we call a bunch of cells connected together?", explanation: "A <strong>Battery</strong>! 🔋 One is a cell, many are a battery." },
                { keys: ['electric circuit'], answer: "A circuit is a complete loop for electricity. If it snaps, the power stops! ⚡", followUp: "What happens if a switch in a circuit is open?", explanation: "The circuit is <strong>broken</strong> 🕯️ and the electricity cannot flow, so the light stays off." },
                { keys: ['energy and movement'], answer: "Stored energy (like in food or batteries) can be changed into movement energy! 🏃", followUp: "What kind of energy does a stretched elastic band have?", explanation: "<strong>Stored Energy</strong>! 🏹 When you let go, it turns into movement energy." },
                { keys: ['sources of energy'], answer: "Energy comes from the sun, wind, water, and fuels like coal. ⛽", followUp: "Is coal a renewable or non-renewable source?", explanation: "It's <strong>Non-renewable</strong>! 🕯️ Once we burn it, it's gone forever." },
                { keys: ['surface of the earth', 'soil'], answer: "The Earth's surface is made of rocks, soil, water, and air. 🌍", followUp: "What is the very top layer of the Earth called?", explanation: "The <strong>Crust</strong>! ⛰️ It's the thin rocky skin we live on." },
                { keys: ['sedimentary rock'], answer: "These rocks form in layers over millions of years from mud and sand. 🥞", followUp: "What do we often find inside sedimentary rocks?", explanation: "<strong>Fossils</strong>! 🦴 They get trapped in the layers of mud." },
                { keys: ['fossil'], answer: "Fossils are the remains of ancient plants and animals preserved in rock. 🦕", followUp: "What do we call a scientist who studies fossils?", explanation: "A <strong>Paleontologist</strong>! 🔬 Like the ones working at the Cradle of Humankind." }
            ];

            let matched = false;
            for (const t of topics) {
                if (t.keys.some(k => q.includes(k))) {
                    addMessage('bot', t.answer);
                    setTimeout(() => {
                        addMessage('bot', `<em>Thinking question: ${t.followUp}</em>`);
                        activeFollowUp = t; 
                    }, 800);
                    matched = true;
                    break;
                }
            }
            if (matched) return;

            // 4. FUZZY PDF SEARCH
            const results = fuse ? fuse.search(userQueryRaw) : [];
            if (results.length > 0) {
                addMessage('bot', `Sho chommie, I found this in the notes: <br><br> "<em>${results[0].item.text.substring(0, 300)}...</em>"`);
            } else {
                addMessage('bot', "Eish chommie! 🕯️ I couldn't find that exact topic. Try asking about <strong>skeletons</strong>, <strong>circuits</strong>, or <strong>fossils</strong>!");
            }
        }, 500);
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function openChat() { document.getElementById('chat-modal').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }
    window.onload = initResources;
</script>
</body>
</html>
