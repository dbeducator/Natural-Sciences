<script>
const STORAGE_PREFIX = 'ns_SRK_';
const TOTAL_WEEKS = 2;
const COURSE_NAME = 'Sedimentary Rocks';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbz89hcA4Z70ZyOKnk2MBBc5kVWKG5aXljNgSzpXZbfXDOhGvtpeZXGSOadoZB_RdyPK/exec';
const SECRET_KEY = 'NatSci2025SecureKey';
const BASE_URL = 'https://dbens-gr5.github.io/Natural-Sciences-Grade5/';
const TOPIC_PREFIX = 'SRK';

var CORRECT_ANSWERS = {
  1: [1, 1, 2, 1, 2],
  2: [1, 1, 2, 1, 2],
};


// Store correct answers immediately
Object.keys(CORRECT_ANSWERS).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(CORRECT_ANSWERS[w]));
});

let currentWeek = 1;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));
let studentName = localStorage.getItem('ns_firstName') || 'Learner';

function toggleTheme() {
  var isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('ns_theme', isLight?'light':'dark');
  document.getElementById('themeToggle').textContent = isLight?'🌙':'☀️';
}
if(localStorage.getItem('ns_theme')==='light') document.getElementById('themeToggle').textContent='🌙';

function showTab(tab) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function selectModule(week) {
  currentWeek = week;
  refreshModuleButtons();
  updateWeekContent();
  showTab('content');
}

function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach((btn, i) => {
    btn.classList.remove('active','completed');
    if(completedWeeks.has(i+1)) { btn.classList.add('completed'); btn.textContent='Week '+(i+1)+' ✓'; }
    else btn.textContent='Week '+(i+1);
    if(i+1 === currentWeek) btn.classList.add('active');
  });
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done/TOTAL_WEEKS*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('weeksComplete').textContent = done+'/'+TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2)+'/'+(TOTAL_WEEKS*2);
  document.getElementById('assessPassed').textContent = done+'/'+TOTAL_WEEKS;
}

function updateWeekContent() {
  const week = weekData[currentWeek];
  document.getElementById('weekTitle').textContent = '📹 ' + week.title;
  document.getElementById('tutorialTitle').textContent = week.tutorialVideo;
  document.getElementById('basicTitle').textContent = week.basicVideo;
  document.getElementById('lessonContent').innerHTML = week.content;
  document.getElementById('resourcesTitle').textContent = '📚 Resources — ' + week.title;
  document.getElementById('resourcesGrid').innerHTML = week.resources.map(r =>
    '<a href="' + BASE_URL + 'comingsoon.html" class="resource-card"><div class="resource-icon">' + r.icon + '</div><h4>' + r.title + '</h4><p>' + r.desc + '</p><span class="download-badge">⏳ Coming Soon</span></a>'
  ).join('');
  renderAssessment();
}

function renderAssessment() {
  const week = weekData[currentWeek];
  const passed = completedWeeks.has(currentWeek);
  let html = '<div class="assess-week">';
  html += '<h2>📝 Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">You need 70% to pass.</p>';
  if(passed) html += '<div class="already-passed"><h3>✅ Already Passed!</h3><p>Well done!</p></div>';
  week.assessment.forEach((q, i) => {
    html += '<div class="quiz-question"><h4>Q'+(i+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach((opt, j) => {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+i+'" value="'+j+'" onchange="saveAnswer('+currentWeek+','+i+','+j+')" '+(passed?'disabled':'')+'> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  if(!passed) html += '<a href="'+BASE_URL+'submit_'+TOPIC_PREFIX+'_'+currentWeek+'.html" onclick="localStorage.setItem('ns_submit_prefix',''+TOPIC_PREFIX+'');localStorage.setItem('ns_submit_week',currentWeek);" class="submit-btn" style="display:block;text-align:center;text-decoration:none;margin-top:16px;">Submit Assessment →</a>';
  html += '</div>';
  document.getElementById('assessmentContent').innerHTML = html;
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q'+q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function markComplete(week) {
  showTab('assessment');
}

function saveCompletedWeeks() {
  localStorage.setItem(STORAGE_PREFIX+'completedWeeks', JSON.stringify([...completedWeeks]));
}

window.onload = function() {
  studentName = localStorage.getItem('ns_firstName') || 'Learner';
  updateProgress();
  refreshModuleButtons();
  selectModule(1);
};
