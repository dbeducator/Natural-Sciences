<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Results - Grade 5 Natural Sciences</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#07070c; color:#fff; min-height:100vh; -webkit-overflow-scrolling:touch; }
body.light-mode { background:#ffffff; color:#222; }
.header { background:linear-gradient(135deg,#1565c0,#0d47a1); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.back-link { color:#fff; font-size:1.4rem; text-decoration:none; }
.header h1 { font-size:1rem; font-weight:700; color:#fff; }
.content { padding:20px; max-width:700px; margin:0 auto; padding-bottom:60px; }
.summary { background:linear-gradient(135deg,#1565c0,#4caf50); border-radius:14px; padding:20px; margin-bottom:20px; text-align:center; }
.summary h2 { font-size:1.3rem; margin-bottom:6px; }
.summary p { opacity:0.85; font-size:0.9rem; }
.empty { text-align:center; padding:60px 20px; }
.empty h2 { font-size:1.2rem; margin-bottom:10px; color:#4caf50; }
.empty p { font-size:0.9rem; color:#999; }
.result-card { padding:16px; border-radius:12px; margin-bottom:14px; border-left:4px solid #4caf50; background:rgba(255,255,255,0.05); }
body.light-mode .result-card { background:#f8f9fa; }
.result-card.failed { border-left-color:#f44336; }
.result-card h3 { font-size:1rem; margin-bottom:8px; color:#4caf50; }
.result-card.failed h3 { color:#f44336; }
.result-card p { font-size:0.85rem; color:#ccc; margin-bottom:4px; }
body.light-mode .result-card p { color:#555; }
.result-card p strong { color:#fff; }
body.light-mode .result-card p strong { color:#222; }
.timestamp { font-size:0.75rem; color:#666; margin-top:6px; }
</style>
</head>
<body id="body">
<script>if(localStorage.getItem('ns_theme')==='light')document.getElementById('body').classList.add('light-mode');</script>
<div class="header">
  <a href="https://dbeducator.github.io/Natural-Sciences/grade5/index.html" class="back-link">←</a>
  <h1>📊 My Assessment Results</h1>
</div>
<div class="content" id="content">
  <div class="empty"><h2>Loading...</h2></div>
</div>
<script>
var all = JSON.parse(localStorage.getItem('ns_assessmentResults') || '[]');
var content = document.getElementById('content');
if(!all.length) {
  content.innerHTML = '<div class="empty"><h2>No Results Yet</h2><p>Complete an assessment to see your results here.</p></div>';
} else {
  var passed = all.filter(function(r){ return r.passed==='YES'; }).length;
  var html = '<div class="summary"><h2>📋 '+all.length+' Submission'+(all.length!==1?'s':'')+'</h2><p>✅ '+passed+' passed &nbsp;|&nbsp; ❌ '+(all.length-passed)+' failed</p></div>';
  all.forEach(function(r,i) {
    var isPassed = r.passed==='YES';
    html += '<div class="result-card'+(isPassed?'':' failed')+'">';
    html += '<h3>'+(isPassed?'✅ PASSED':'❌ FAILED')+' — Submission #'+(i+1)+'</h3>';
    html += '<p><strong>Topic:</strong> '+(r.courseName||'')+'</p>';
    html += '<p><strong>Week:</strong> '+r.week+' &nbsp;|&nbsp; <strong>Score:</strong> '+r.score+'% ('+r.correct+'/'+r.total+')</p>';
    html += '<p><strong>Learner:</strong> '+r.studentName+'</p>';
    html += '<p class="timestamp">'+r.timestamp+'</p>';
    html += '</div>';
  });
  content.innerHTML = html;
}
</script>
</body>
</html>
