<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Assessment Result — Grade 5 Natural Sciences</title>
<link rel="icon" type="image/png" href="https://dbeducator.github.io/Natural-Sciences/grade5/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#07070c;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
body.light-mode{background:linear-gradient(135deg,#f5f7fa,#c3cfe2);color:#333;}
.header{background:linear-gradient(135deg,#9c27b0,#9c27b0cc);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.back-link{color:#fff;font-size:1.4rem;text-decoration:none;}
.header-brand{display:flex;align-items:center;gap:10px;flex:1;}
.header-brand img{width:28px;height:28px;border-radius:6px;}
.header h1{font-size:0.9rem;font-weight:700;color:#fff;}
.body{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 20px;}
.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px 24px;max-width:360px;width:100%;text-align:center;}
body.light-mode .card{background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.icon{font-size:3.5rem;margin-bottom:16px;}
h1{font-size:1.4rem;margin-bottom:10px;}
p{color:#aaa;font-size:0.9rem;line-height:1.6;margin-bottom:8px;}
body.light-mode p{color:#555;}
.score{font-size:2.5rem;font-weight:800;margin:10px 0;}
.passed{color:#4caf50;}.failed{color:#f44336;}
.btn{display:block;padding:14px 20px;border-radius:12px;text-decoration:none;font-weight:700;font-size:1rem;margin-top:12px;text-align:center;}
.btn-primary{background:linear-gradient(135deg,#9c27b0,#9c27b099);color:#fff;}
.btn-results{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;}
.btn-home{background:rgba(255,255,255,0.08);color:#aaa;border:1px solid rgba(255,255,255,0.15);}
body.light-mode .btn-home{background:#f0f0f0;color:#666;border-color:#e0e0e0;}
</style>
</head>
<body id="body">
<script>if(localStorage.getItem('cl_theme')==='light')document.getElementById('body').classList.add('light-mode');</script>
<div class="header">
  <a href="https://dbeducator.github.io/Natural-Sciences/grade5/topic17.html" class="back-link">←</a>
  <div class="header-brand">
    <img src="https://dbeducator.github.io/Natural-Sciences/grade5/favicon.png" alt="Logo" onerror="this.style.display='none'">
    <h1>Surface of the Earth — Week 2 Assessment</h1>
  </div>
</div>
<div class="body">
<div class="card" id="card"><div class="icon">&#x23F3;</div><h1>Marking...</h1><p>Please wait</p></div>
</div>
<script>
var CORRECT=[1, 1, 2, 2, 2, 2, 1, 2, 1, 2];
var TOTAL=10;
var SK='coachL_SRE_';
var W=2;
var BACK='https://dbeducator.github.io/Natural-Sciences/grade5/topic17.html';
var sa=JSON.parse(localStorage.getItem(SK+'answers_'+W)||'{}');
var answered=Object.keys(sa).length;
if(answered<TOTAL){
  document.getElementById('card').innerHTML='<div class="icon">&#x26A0;&#xFE0F;</div><h1>Incomplete</h1><p>You answered '+answered+' of '+TOTAL+' questions.</p><p>Please go back and answer all questions first.</p><a href="'+BACK+'" class="btn btn-primary">&#x2190; Back to Assessment</a>';
}else{
  var score=0,answers=[];
  for(var i=0;i<TOTAL;i++){var ua=parseInt(sa['q'+i]),ok=(ua===CORRECT[i]);if(ok)score++;answers.push({q:i+1,ua:ua,correct:CORRECT[i],ok:ok});}
  var pct=Math.round(score/TOTAL*100),passed=pct>=70;
  var name=localStorage.getItem('cl_firstName')||'Learner';
  var payload={secretKey:'CoachL2025SecureKey',timestamp:new Date().toLocaleString(),studentName:name,studentEmail:'anonymous@natsci.app',courseName:'Gr5 NS: Surface of the Earth Week 2',week:2,score:pct,correct:score,total:TOTAL,passed:passed?'YES':'NO'};
  try{var img=new Image();img.src='https://script.google.com/macros/s/AKfycbz89hcA4Z70ZyOKnk2MBBc5kVWKG5aXljNgSzpXZbfXDOhGvtpeZXGSOadoZB_RdyPK/exec?data='+encodeURIComponent(JSON.stringify(payload));}catch(e){}
  var allR=JSON.parse(localStorage.getItem('ns_assessmentResults')||'[]');allR.push(payload);
  localStorage.setItem('ns_assessmentResults',JSON.stringify(allR));
  localStorage.removeItem(SK+'answers_'+W);
  if(passed){var cw=new Set(JSON.parse(localStorage.getItem(SK+'completedWeeks')||'[]'));cw.add(W);localStorage.setItem(SK+'completedWeeks',JSON.stringify([...cw]));}
  document.getElementById('card').innerHTML=
    '<div class="icon">'+(passed?'&#x1F389;':'&#x1F614;')+'</div>'+
    '<h1 class="'+(passed?'passed':'failed')+'">'+(passed?'Well Done!':'Try Again')+'</h1>'+
    '<div class="score '+(passed?'passed':'failed')+'">'+pct+'%</div>'+
    '<p>'+score+'/'+TOTAL+' correct.'+(passed?' Excellent work!':' You need 70% ('+Math.ceil(TOTAL*0.7)+'/'+TOTAL+') to pass.')+'</p>'+
    '<p style="font-size:0.8rem;color:#888;">Surface of the Earth — Week 2</p>'+
    '<a href="'+BACK+'" class="btn btn-primary">'+(passed?'Continue Topic &#x2192;':'Try Again &#x2192;')+'</a>'+
    '<a href="https://dbeducator.github.io/Natural-Sciences/grade5/results.html" class="btn btn-results">&#x1F4CA; My Results</a>'+
    '<a href="https://dbeducator.github.io/Natural-Sciences/grade5/index.html" class="btn btn-home">&#x1F3E0; All Topics</a>';
}
</script>
</body>
</html>
